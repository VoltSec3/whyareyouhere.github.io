<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #080b10;
    color: #e2e8f0;
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .grid-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    background-image:
      linear-gradient(rgba(0,255,170,0.045) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,170,0.045) 1px, transparent 1px);
    background-size: 44px 44px;
    animation: gridDrift 35s linear infinite;
  }

  .grid-fade {
    position: fixed;
    inset: 0;
    z-index: 1;
    background:
      radial-gradient(ellipse 90% 55% at 50% 50%, transparent 20%, #080b10 85%),
      linear-gradient(to bottom, #080b10 0%, transparent 12%, transparent 88%, #080b10 100%);
  }

  @keyframes gridDrift {
    0% { transform: translateY(0); }
    100% { transform: translateY(44px); }
  }

  .page {
    position: relative;
    z-index: 2;
    max-width: 760px;
    margin: 0 auto;
    padding: 72px 36px 88px;
  }

  .hero {
    margin-bottom: 52px;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.1s forwards;
  }

  .name {
    font-size: clamp(48px, 9vw, 76px);
    font-weight: 800;
    line-height: 0.95;
    letter-spacing: -0.03em;
    color: #eef2ff;
    margin-bottom: 18px;
  }

  .name em {
    font-style: normal;
    color: #00ffaa;
  }

  .role {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: #3a5a6e;
    letter-spacing: 0.1em;
    margin-bottom: 22px;
  }

  .glow-line {
    width: 52px;
    height: 1.5px;
    background: linear-gradient(90deg, #00ffaa, transparent);
    border-radius: 1px;
    margin-bottom: 22px;
  }

  .tagline {
    font-size: 16px;
    font-weight: 400;
    color: #4a6478;
    max-width: 400px;
    line-height: 1.65;
  }

  .section {
    margin-bottom: 48px;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards;
  }

  .section:nth-child(2) { animation-delay: 0.2s; }
  .section:nth-child(3) { animation-delay: 0.32s; }
  .section:nth-child(4) { animation-delay: 0.44s; }

  .section-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.16em;
    color: #00ffaa;
    text-transform: uppercase;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, rgba(0,255,170,0.25), transparent);
  }

  .conveyor-wrap {
    overflow: hidden;
    position: relative;
    mask-image: linear-gradient(90deg, transparent 0%, black 8%, black 92%, transparent 100%);
    -webkit-mask-image: linear-gradient(90deg, transparent 0%, black 8%, black 92%, transparent 100%);
  }

  .conveyor-track {
    display: flex;
    gap: 10px;
    width: max-content;
    animation: conveyor 28s linear infinite;
  }

  @keyframes conveyor {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  .chip {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 7px 16px;
    border-radius: 3px;
    border: 1px solid rgba(0,255,170,0.12);
    background: rgba(0,255,170,0.03);
    color: #5a8a78;
    letter-spacing: 0.05em;
    white-space: nowrap;
    cursor: default;
    user-select: none;
  }

  .contact-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  .contact-link {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 8px 18px;
    border-radius: 3px;
    border: 1px solid rgba(255,255,255,0.07);
    color: #3a5a6e;
    text-decoration: none;
    letter-spacing: 0.06em;
    transition: all 0.22s;
    cursor: pointer;
  }

  .contact-link:hover {
    border-color: rgba(0,255,170,0.35);
    color: #00ffaa;
    background: rgba(0,255,170,0.04);
  }

  .contact-link.primary {
    border-color: rgba(0,255,170,0.3);
    color: #00d490;
  }

  .footer-line {
    margin-top: 68px;
    display: flex;
    align-items: center;
    gap: 18px;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.6s forwards;
  }

  .footer-item {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: #1e3040;
    letter-spacing: 0.08em;
  }

  .footer-sep { color: #1a2a35; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="grid-bg"></div>
<div class="grid-fade"></div>

<div class="page">

  <div class="hero section">
    <div class="name">Sawyer<br><em>Davis</em></div>
    <div class="role">// cybersecurity student</div>
    <div class="glow-line"></div>
    <div class="tagline">I fuck around with cybersecurity. I'm not good but close enough.</div>
  </div>

  <div class="section">
    <div class="section-label">Focus Areas</div>
    <div class="conveyor-wrap">
      <div class="conveyor-track" id="track"></div>
    </div>
  </div>

  <div class="section">
    <div class="section-label">Contact</div>
    <div class="contact-row">
      <div class="contact-link primary">phonesawyer@gmail.com</div>
      <div class="contact-link">github.com/voltsec3</div>
    </div>
  </div>

  <div class="footer-line">
    <div class="footer-item">ethical hacking only</div>
    <div class="footer-sep">·</div>
    <div class="footer-item">open to collaboration</div>
    <div class="footer-sep">·</div>
    <div class="footer-item">2025</div>
  </div>

</div>

<script>
  const skills = [
    'Web Pentesting', 'Network Security', 'CTF Challenges', 'Linux',
    'OSINT', 'SQL Injection', 'Cryptography', 'Nmap', 'Wireshark',
    'Burp Suite', 'Python Scripting', 'Reverse Engineering', 'Metasploit', 'Bash'
  ];

  const track = document.getElementById('track');
  [...skills, ...skills].forEach(s => {
    const c = document.createElement('div');
    c.className = 'chip';
    c.textContent = s;
    track.appendChild(c);
  });
</script>

</body>
</html>
