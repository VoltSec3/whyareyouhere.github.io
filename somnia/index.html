<!DOCTYPE html>
<html lang="en">
<head>
<meta property="og:title" content="Somnia" />
<meta property="og:description" content="the one and all dream journal solution. comes with analytics, and privacy-first design. no sign up, no nothing." />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://voltsec.xyz" />
<meta property="og:image" content="https://voltsec.xyz/images/preview.png" />
<meta property="og:site_name" content="Somnia" />
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Somnia">
<meta name="twitter:description" content="Record dreams with advanced logging and analytics — built with privacy first.">
<meta name="twitter:image" content="https://voltsec.xyz/images/preview.png">
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Somnia</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0c14;
    --surface: #16121f;
    --surface2: #1e1829;
    --border: rgba(148, 130, 210, 0.15);
    --border-hover: rgba(148, 130, 210, 0.35);
    --purple: #9b87d4;
    --purple-dim: #6b57a8;
    --purple-bright: #c4b4f0;
    --purple-faint: rgba(155, 135, 212, 0.08);
    --pink-bright: #f0c4d8;
    --text: #e8e0f4;
    --text-muted: #8b7fb0;
    --text-dim: #5a5075;
    --text-title: #c4b4f0;
    --green: #7fc9a0;
    --font-serif: 'Libre Baskerville', Georgia, serif;
    --font-mono: 'DM Mono', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-serif);
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    overscroll-behavior: none;
  }

  /* app shell */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 32px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
    gap: 12px;
  }
  .header-center {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .header-stat {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 4px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
  }
  .header-stat-value { color: var(--purple); }
  .logo {
    font-size: 20px;
    letter-spacing: 0.12em;
    color: var(--purple-bright);
    font-weight: 400;
    font-style: italic;
    cursor: pointer;
    transition: opacity 0.15s;
    line-height: 1;
    flex-shrink: 0;
  }
  .logo:hover { opacity: 0.7; }
  .logo-sub {
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--text-dim);
    font-style: normal;
    font-family: var(--font-mono);
    margin-top: 3px;
    display: block;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .privacy-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--green);
    background: rgba(127,201,160,0.08);
    border: 1px solid rgba(127,201,160,0.2);
    padding: 5px 12px;
    border-radius: 20px;
    letter-spacing: 0.05em;
  }
  .privacy-badge::before {
    content: '';
    width: 6px;
    height: 6px;
    background: var(--green);
    border-radius: 50%;
    display: inline-block;
    flex-shrink: 0;
  }
  .music-toggle {
    width: 32px;
    height: 32px;
    border: 1px solid var(--border);
    color: var(--text-dim);
    background: transparent;
    cursor: pointer;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .music-toggle:hover { border-color: var(--border-hover); color: var(--text-muted); }
  .music-toggle.playing { border-color: var(--purple-dim); color: var(--purple-bright); background: var(--purple-faint); }
  .music-toggle img { width: 20px; height: 20px; opacity: 0.5; transition: opacity 0.2s; }
  .music-toggle.playing img { opacity: 1; }

  /* layout */
  .layout {
    display: flex;
    flex: 1;
    height: calc(100vh - 61px);
    height: calc(100dvh - 61px);
    overflow: hidden;
  }

  /* sidebar */
  .sidebar {
    width: 268px;
    min-width: 268px;
    border-right: 1px solid var(--border);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    transition: transform 0.3s ease;
    scrollbar-width: none; /* Firefox */
  }
  .sidebar::-webkit-scrollbar {
    display: none; /* Chrome, Safari, Edge */
  }
  .sidebar-top { padding: 16px 20px; border-bottom: 1px solid var(--border); }
  .nav-tabs {
    display: flex;
    gap: 2px;
    border-bottom: 1px solid var(--border);
  }
  .nav-tab {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    padding: 10px 14px;
    border: none;
    background: none;
    color: var(--text-dim);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color 0.2s, border-color 0.2s;
    position: relative;
  }
  .nav-tab:hover { color: var(--text-muted); }
  .nav-tab.active { color: var(--purple-bright); border-bottom-color: var(--purple); }
  .sidebar-section { padding: 0 20px; margin-bottom: 16px; }
  .sidebar-label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 10px;
  }
  .btn-new-sidebar {
    display: block;
    width: 100%;
    background: var(--purple-faint);
    border: 1px solid var(--border-hover);
    color: var(--purple-bright);
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    padding: 12px 16px;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    text-align: center;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-new-sidebar:hover { background: rgba(155,135,212,0.15); border-color: var(--purple); }
  .search-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 8px 12px;
    border-radius: 4px;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-input:focus { border-color: var(--purple-dim); }
  .search-input::placeholder { color: var(--text-dim); }
  .sort-row { display: flex; gap: 5px; justify-content: center; }
  .sort-btn {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.04em;
    padding: 5px 12px;
    border-radius: 4px;
    cursor: pointer;
    border: 1px solid var(--border);
    color: var(--text-dim);
    background: transparent;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .sort-btn:hover { border-color: var(--border-hover); color: var(--text-muted); }
  .sort-btn.active { border-color: var(--purple-dim); color: var(--purple-bright); background: var(--purple-faint); }
  .tag-filters { display: flex; flex-wrap: wrap; gap: 5px; }
  .tag-pill {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.04em;
    padding: 5px 10px;
    border-radius: 4px;
    cursor: pointer;
    border: 1px solid var(--border);
    color: var(--text-dim);
    background: transparent;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .tag-pill:hover { border-color: var(--border-hover); color: var(--text-muted); }
  .tag-pill.active { border-color: var(--purple-dim); color: var(--purple-bright); background: var(--purple-faint); }
  .dream-count {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-dim);
    padding: 0 20px 10px;
  }
  .dream-list { overflow-y: auto; overflow-x: hidden; flex: 1; scrollbar-width: none; }
  .dream-list::-webkit-scrollbar { display: none; }
  .dream-item {
    position: relative;
    padding: 14px 20px;
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: background 0.2s, padding-left 0.2s, border-color 0.2s;
    border-bottom: 1px solid var(--border);
    -webkit-tap-highlight-color: transparent;
  }
  .dream-item:hover { background: var(--surface); padding-left: 24px; }
  .dream-item.active { border-left-color: var(--purple); background: var(--surface); }
  .dream-item-inner { padding-right: 26px; }
  .dream-item-date { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); letter-spacing: 0.08em; margin-bottom: 4px; }
  .dream-item-title { font-size: 13px; color: var(--text-title); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
  .dream-item-preview { font-size: 12px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-style: italic; }
  .dream-item-tags { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
  .mini-tag { font-family: var(--font-mono); font-size: 9px; color: var(--purple-dim); background: var(--purple-faint); border-radius: 2px; padding: 1px 5px; }
  .dream-item-close {
    position: absolute;
    right: 9px;
    top: 50%;
    transform: translateY(-50%);
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 1px solid rgba(107,87,168,0.45);
    background: rgba(107,87,168,0.12);
    color: rgba(196,180,240,0.55);
    font-size: 11px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.2s, background 0.15s, border-color 0.15s, color 0.15s;
    font-family: var(--font-mono);
    font-weight: 300;
    -webkit-tap-highlight-color: transparent;
  }
  .dream-item:hover .dream-item-close { opacity: 1; }
  .dream-item-close:hover { background: rgba(107,87,168,0.22); border-color: rgba(155,135,212,0.6); color: var(--purple-bright); }
  .empty-list { padding: 40px 20px; text-align: center; color: var(--text-dim); font-style: italic; font-size: 13px; }

  /* main */
  .main {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  @keyframes fadeInContent {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .main-content { }
  .main-content.animate { animation: fadeInContent 0.4s ease; }

  /* grid canvas */
  .grid-canvas { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }

  /* viewer */
  .viewer { flex: 1; padding: 40px 48px; max-width: 760px; width: 100%; margin: 0 auto; position: relative; z-index: 1; }
  .viewer-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; gap: 12px; flex-wrap: wrap; }
  .meta-date { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.12em; color: var(--text-dim); }
  .btn-edit {
    background: none;
    border: 1px solid var(--border-hover);
    color: var(--purple-bright);
    padding: 9px 20px;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-edit:hover { background: var(--purple-faint); border-color: var(--purple); }
  .view-star-systems { display: flex; gap: 36px; margin-bottom: 24px; flex-wrap: wrap; }
  .view-star-system { display: flex; flex-direction: column; gap: 5px; }
  .view-star-label { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--text-dim); }
  .view-stars { display: flex; gap: 4px; }
  .vstar { font-size: 15px; color: var(--purple-bright); opacity: 0.18; }
  .vstar.on { opacity: 1; }
  .vstar.level-1 { color: var(--purple); }
  .vstar.level-2 { color: var(--purple-bright); }
  .vstar.level-3 { color: #b19fff; }
  .vstar.level-4 { color: #c4b4f0; }
  .vstar.level-5 { color: #e8e0f4; }
  .vstar-q { font-size: 15px; color: var(--pink-bright); opacity: 0.18; }
  .vstar-q.on { opacity: 1; }
  .vstar-q.level-1 { color: #f0c4d8; }
  .vstar-q.level-2 { color: #ffb3ba; }
  .vstar-q.level-3 { color: #ff9999; }
  .vstar-q.level-4 { color: #ff7f7f; }
  .vstar-q.level-5 { color: #ff4d4d; }
  .view-star-hint { font-family: var(--font-mono); font-size: 9px; color: var(--text-dim); }
  .view-title { font-size: 28px; line-height: 1.5; color: var(--text-title); white-space: pre-wrap; min-height: 40px; }
  .view-title.untitled { color: var(--text-dim); font-style: italic; font-weight: 400; }
  .view-body { font-family: var(--font-serif); font-size: 16px; line-height: 1.85; color: var(--text-muted); font-style: italic; white-space: pre-wrap; min-height: 80px; }
  .view-body.empty { color: var(--text-dim); }
  .view-tags-row { margin-top: 28px; padding-top: 20px; border-top: 1px solid var(--border); display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .view-tags-label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.2em; color: var(--text-dim); text-transform: uppercase; }
  .view-tag { font-family: var(--font-mono); font-size: 11px; color: var(--purple-dim); background: var(--purple-faint); border-radius: 2px; padding: 1px 5px; }
  .view-footer { margin-top: 28px; padding-top: 20px; border-top: 1px solid var(--border); }
  .btn-delete {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 9px 18px;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-delete:hover { border-color: var(--border-hover); color: var(--text); }

  /* editor */
  .editor { flex: 1; padding: 40px 48px; max-width: 760px; width: 100%; margin: 0 auto; position: relative; z-index: 1; }
  .editor.editor-new { animation: fadeInContent 0.4s ease; }
  .editor-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; gap: 12px; flex-wrap: wrap; }
  .btn-cancel-edit {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 9px 18px;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-cancel-edit:hover { border-color: var(--border-hover); color: var(--text); }
  .star-systems { display: flex; gap: 36px; margin-bottom: 24px; align-items: flex-start; flex-wrap: wrap; }
  .star-system { display: flex; flex-direction: column; gap: 5px; }
  .star-system-label { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--text-dim); }
  .stars-row { display: flex; gap: 4px; }
  .star-system-hint { font-family: var(--font-mono); font-size: 9px; color: var(--text-dim); letter-spacing: 0.05em; }
  .star-lucid { font-size: 22px; cursor: pointer; opacity: 0.18; transition: all 0.2s ease; color: var(--purple-dim); user-select: none; -webkit-tap-highlight-color: transparent; }
  .star-lucid.filled { opacity: 1; }
  .star-lucid.filled.level-1 { color: var(--purple); }
  .star-lucid.filled.level-2 { color: var(--purple-bright); }
  .star-lucid.filled.level-3 { color: #b19fff; }
  .star-lucid.filled.level-4 { color: #c4b4f0; }
  .star-lucid.filled.level-5 { color: #e8e0f4; }
  .star-lucid:hover { transform: scale(1.1); opacity: 0.8; }
  .star-quality { font-size: 22px; cursor: pointer; opacity: 0.18; transition: all 0.2s ease; color: #d4a0a0; user-select: none; -webkit-tap-highlight-color: transparent; }
  .star-quality.filled { opacity: 1; }
  .star-quality.filled.level-1 { color: #f0c4d8; }
  .star-quality.filled.level-2 { color: #ffb3ba; }
  .star-quality.filled.level-3 { color: #ff9999; }
  .star-quality.filled.level-4 { color: #ff7f7f; }
  .star-quality.filled.level-5 { color: #ff4d4d; }
  .star-quality:hover { transform: scale(1.1); opacity: 0.8; }
  .title-input {
    width: 100%;
    background: none;
    border: none;
    font-family: var(--font-serif);
    font-size: 28px;
    font-weight: 700;
    color: var(--text-title);
    outline: none;
    margin-bottom: 20px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 16px;
    line-height: 1.3;
  }
  .title-input::placeholder { color: var(--text-dim); }
  .body-input {
    width: 100%;
    background: none;
    border: none;
    font-family: var(--font-serif);
    font-size: 16px;
    line-height: 1.85;
    color: var(--text-muted);
    outline: none;
    resize: none;
    min-height: 320px;
    font-style: italic;
  }
  .body-input::placeholder { color: var(--text-dim); font-style: italic; }
  .tags-row { margin-top: 28px; padding-top: 20px; border-top: 1px solid var(--border); display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .tags-label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.2em; color: var(--text-dim); text-transform: uppercase; }
  .tag-editable {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--purple-dim);
    background: var(--purple-faint);
    border-radius: 2px;
    padding: 3px 7px;
    cursor: pointer;
    transition: all 0.2s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .tag-editable:hover { background: rgba(155,135,212,0.3); color: var(--purple); transform: translateY(-1px); }
  .tag-input {
    background: none;
    border: none;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text);
    outline: none;
    width: 90px;
    padding: 3px 0;
  }
  .tag-input::placeholder { color: var(--text-dim); }
  .editor-footer { margin-top: 28px; padding-top: 20px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
  .btn-save {
    background: var(--purple);
    color: #0e0c14;
    border: none;
    padding: 11px 28px;
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.1em;
    cursor: pointer;
    border-radius: 4px;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-save:hover { background: var(--purple-bright); }
  .save-status { font-family: var(--font-mono); font-size: 11px; color: var(--green); opacity: 0; transition: opacity 0.3s; margin-left: auto; }
  .save-status.show { opacity: 1; }

  /* analyzer */
  .analyzer { flex: 1; padding: 40px 48px; max-width: 900px; width: 100%; margin: 0 auto; position: relative; z-index: 1; }
  .analyzer-header { margin-bottom: 32px; }
  .analyzer-title { font-size: 24px; font-weight: 700; color: var(--text-title); margin-bottom: 8px; }
  .analyzer-subtitle { font-size: 14px; color: var(--text-muted); font-style: italic; }
  .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 32px; }
  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 20px;
    transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
  }
  .chart-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(155,135,212,0.1); border-color: var(--border-hover); }
  .chart-title { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 16px; }
  .chart-container { height: 200px; position: relative; }
  .bar-chart { display: flex; align-items: flex-end; height: 160px; gap: 8px; padding: 0 4px; }
  .bar {
    flex: 1;
    background: var(--purple-faint);
    border: 1px solid var(--border);
    border-radius: 2px 2px 0 0;
    position: relative;
    transition: background 0.2s, border-color 0.2s, transform 0.2s;
    cursor: pointer;
    min-height: 2px;
  }
  .bar:hover { background: var(--purple); border-color: var(--purple-bright); transform: scaleY(1.05); transform-origin: bottom; }
  .bar-label { font-family: var(--font-mono); font-size: 9px; color: var(--text-dim); position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%); white-space: nowrap; }

  .mobile-nav-btn svg { width: 20px; height: 20px; }
  .mobile-new-btn {
    width: 36px;

  /* mobile overlay for sidebar */

  /* continuation */
  .continuation-row { margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

  .continuation-select:focus { border-color: var(--purple-dim); }

  .view-continuation-link:hover { color: var(--purple-bright); }

  .milestone-modal .modal-title { font-size: 20px; margin-bottom: 6px; }

  /* milestone glyph on dream item */

  .btn-pin {
    background: none;
    border: 1px solid var(--border);

    font-size: 11px;
    letter-spacing: 0.08em;

  .btn-pin:hover { border-color: var(--border-hover); color: var(--text); }
  .btn-pin.pinned { border-color: var(--purple-dim); color: var(--purple-bright); background: var(--purple-faint); }
  .view-milestone { display: flex; align-items: center; justify-content: flex-start; gap: 8px; font-family: var(--font-mono); font-size: 10px; color: var(--purple-dim); letter-spacing: 0.15em; margin-bottom: 16px; }
  .view-milestone-glyph { font-size: 20px; color: var(--purple-bright); }

  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ---- responsive ---- */
  @media (max-width: 768px) {
    .header { padding: 10px 16px; }
    .header-center { display: none; }
    .privacy-badge { display: none; }
    .btn-back { display: block; }

    .layout {
      height: calc(100dvh - 57px);
      position: relative;

    /* sidebar drawer — soft slide */
    .sidebar {
      position: fixed;

    /* touch-friendly delete button always visible on mobile */

    /* bottom nav handles new entry + tab switching — hide from sidebar */
    .sidebar .nav-tabs { display: none; }

    .main { width: 100%; }

  }

  @media (max-width: 400px) {

</style>

<body>
<div id="app"></div>

<script>
(function() {

const STORAGE_KEY = 'somnia_dreams_v1';
function loadDreams() { try { const r = localStorage.getItem(STORAGE_KEY); return r ? JSON.parse(r) : []; } catch(e) { return []; } }
function saveDreams(d) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch(e) {} }
function formatDate(iso) { return new Date(iso).toLocaleDateString('en-US', { weekday:'short', year:'numeric', month:'short', day:'numeric' }); }
function formatTime(iso) { return new Date(iso).toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' }); }
function newDream() { return { id: Date.now().toString(), title:'', body:'', tags:[], lucidity:0, quality:-1, continuationOf: null, pinned: false, createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() }; }

const ALL_TAGS = ['flying','water','chase','lucid','recurring','people','places','surreal','peaceful','dark'];
const QUALITY_LABELS = ['', 'bad dream', 'ordinary', 'pleasant', 'vivid', 'blissful'];
const SORT_OPTIONS = [{key:'date',label:'Date'},{key:'lucidity',label:'Lucidity'},{key:'quality',label:'Quality'}];
const MILESTONES = [
  { count: 1,   glyph: '✦', title: 'First dream recorded', body: 'The journey begins. Every great dreamer starts with a single entry.' },
  { count: 10,  glyph: '◈', title: 'Ten dreams', body: 'A week of nights, give or take. Patterns are starting to form.' },
  { count: 25,  glyph: '◉', title: 'Twenty-five dreams', body: 'You\'re building a real archive of your inner world.' },
  { count: 50,  glyph: '⬡', title: 'Fifty dreams', body: 'Half a hundred. Your subconscious has a lot to say.' },
  { count: 100, glyph: '✸', title: 'One hundred dreams', body: 'A century of dreams. This is something rare.' },
  { count: 250, glyph: '❋', title: 'Two hundred and fifty dreams', body: 'A dedicated dreamer. The archive grows deep.' },
  { count: 500, glyph: '✺', title: 'Five hundred dreams', body: 'Extraordinary. Your dream journal is a life\'s work.' },
];

const FLAVOR = [
  { title: 'Somnia', body: 'The latin root <em>somnus</em> which means <strong>sleep</strong>. The root is used in medical disorders like <em>insomnia</em>, <em>somniphobia</em> or <em>somnambulism</em> (sleepwalking).' },
  { title: '…?', body: '<em>The mind wanders far when the body is still.</em>' },
  { title: 'hello!', body: 'welcome to somnia, a dream journal for the <strong>lucid</strong> and the <strong>curious.</strong> i wish you <strong>luck</strong> on your path, <ins>whatever it may be...</ins>' }
];

let state = {
  dreams: loadDreams(),
  page: 'home',
  prevPage: null,
  currentId: null,
  editing: null,
  flavor: Math.floor(Math.random() * FLAVOR.length),
  search: '', filterTag: '',
  sortBy: 'date', sortDir: 'desc',
  saveStatus: false,
  confirmDeleteId: null,
  milestone: null,
  musicPlaying: false,
  audioElement: null,
  sidebarOpen: false
};

// returns the milestone object if this dream's chronological position matches a milestone count
function getMilestoneForDream(dreamId) {
  const byAge = [...state.dreams].sort((a,b) => new Date(a.createdAt) - new Date(b.createdAt));
  const pos = byAge.findIndex(d => d.id === dreamId) + 1; // 1-indexed
  return MILESTONES.find(m => m.count === pos) || null;
}

function sortedDreams(list) {
  return [...list].sort((a,b) => {
    if (a.pinned && !b.pinned) return -1;
    if (!a.pinned && b.pinned) return 1;
    let va, vb;
    if (state.sortBy==='date') { va=new Date(a.updatedAt).getTime(); vb=new Date(b.updatedAt).getTime(); }
    else if (state.sortBy==='lucidity') { va=a.lucidity||0; vb=b.lucidity||0; }
    else { va=a.quality<0?-1:a.quality; vb=b.quality<0?-1:b.quality; }
    return state.sortDir==='desc'?vb-va:va-vb;
  });
}
function filteredDreams() {
  let list = [...state.dreams];
  if (state.search.trim()) { const q=state.search.toLowerCase(); list=list.filter(d=>d.title.toLowerCase().includes(q)||d.body.toLowerCase().includes(q)||d.tags.some(t=>t.toLowerCase().includes(q))); }
  if (state.filterTag) list=list.filter(d=>d.tags.includes(state.filterTag));
  return sortedDreams(list);
}
function allUsedTags() { const s=new Set(); state.dreams.forEach(d=>d.tags.forEach(t=>s.add(t))); return Array.from(s); }
function esc(s) { if(!s)return''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// grid
let gridRAF = null;
let gridCanvas = null;
let gridCtx = null;
let gridW = 0, gridH = 0;
let gridT = 0;
let gridOffX = 0, gridOffY = 0, gridTargetOX = 0, gridTargetOY = 0;
let gridResizeObs = null;
let gridMouseHandler = null;

function gridDraw() {
  if (!gridCanvas || !gridCtx) return;
  gridRAF = requestAnimationFrame(gridDraw);
  gridT += 0.003;
  gridOffX += (gridTargetOX - gridOffX) * 0.05;
  gridOffY += (gridTargetOY - gridOffY) * 0.05;
  gridCtx.clearRect(0, 0, gridW, gridH);
  const CELL = 52;
  const driftX = (gridT * 10) % CELL;
  const driftY = (gridT * 7) % CELL;
  const baseX = -CELL + gridOffX * 0.5 - driftX;
  const baseY = -CELL + gridOffY * 0.5 - driftY;
  const cols = Math.ceil(gridW / CELL) + 3;
  const rows = Math.ceil(gridH / CELL) + 3;
  gridCtx.strokeStyle = 'rgba(155, 135, 212, 0.16)';
  gridCtx.lineWidth = 0.5;
  gridCtx.beginPath();
  for (let c = 0; c <= cols; c++) {
    const x = Math.round(baseX + c * CELL) + 0.5;
    gridCtx.moveTo(x, 0); gridCtx.lineTo(x, gridH);
  }
  for (let r = 0; r <= rows; r++) {
    const y = Math.round(baseY + r * CELL) + 0.5;
    gridCtx.moveTo(0, y); gridCtx.lineTo(gridW, y);
  }
  gridCtx.stroke();
}

function startGrid() {
  const canvas = document.getElementById('grid-canvas');
  if (!canvas) return;
  stopGrid();
  gridCanvas = canvas;
  gridCtx = canvas.getContext('2d');
  function sizeCanvas() {
    const parent = canvas.parentElement;
    if (!parent) return;
    gridW = canvas.width = parent.clientWidth;
    gridH = canvas.height = parent.clientHeight;
  }
  sizeCanvas();
  gridResizeObs = new ResizeObserver(sizeCanvas);
  gridResizeObs.observe(canvas.parentElement);
  const mainEl = canvas.parentElement;
  gridMouseHandler = (e) => {
    const r = mainEl.getBoundingClientRect();
    gridTargetOX = ((e.clientX - r.left) / r.width - 0.5) * 24;
    gridTargetOY = ((e.clientY - r.top) / r.height - 0.5) * 16;
  };
  mainEl.addEventListener('mousemove', gridMouseHandler);
  gridDraw();
}

function stopGrid() {
  if (gridRAF) { cancelAnimationFrame(gridRAF); gridRAF = null; }
  if (gridResizeObs) { gridResizeObs.disconnect(); gridResizeObs = null; }
  if (gridCanvas && gridMouseHandler) {
    gridCanvas.parentElement && gridCanvas.parentElement.removeEventListener('mousemove', gridMouseHandler);
    gridMouseHandler = null;
  }
  gridCanvas = null; gridCtx = null;
}

// render
function render() {
  const app = document.getElementById('app');
  const dreams = filteredDreams();
  const usedTags = allUsedTags();
  const isMobile = window.innerWidth <= 768;
  const showBack = isMobile && state.page !== 'home';
  const shouldAnimate = state.page !== state.prevPage;
  state.prevPage = state.page;
  // dreams tab is active when sidebar is open, OR when not on analyzer (and sidebar closed)
  const dreamsTabActive = state.sidebarOpen || (state.page === 'view' || state.page === 'edit' || state.page === 'new');
  const analyticsTabActive = state.page === 'analyzer' && !state.sidebarOpen;

  let mainContent = '';
  if (state.page === 'home') mainContent = renderHomeMain();
  else if (state.page === 'view') mainContent = renderViewer(state.editing);
  else if (state.page === 'analyzer') mainContent = renderAnalyzer();
  else mainContent = renderEditor(state.editing);

  app.innerHTML = `
    <header class="header">
      <div style="display:flex;align-items:center;gap:12px;">
        ${showBack ? `<button class="btn-back" onclick="actions.goBack()">← Back</button>` : ''}
        <div class="logo" onclick="actions.goHome()">Somnia<span class="logo-sub">dream journal</span></div>
      </div>
      <div class="header-center">
        <div class="header-stat">Total: <span class="header-stat-value">${state.dreams.length}</span></div>
        <div class="header-stat">Lucid: <span class="header-stat-value">${state.dreams.filter(d=>d.tags.includes('lucid')).length}</span></div>
        <div class="header-stat">This month: <span class="header-stat-value">${state.dreams.filter(d=>{const m=new Date(),c=new Date(d.createdAt);return c.getFullYear()===m.getFullYear()&&c.getMonth()===m.getMonth();}).length}</span></div>
      </div>
      <div class="header-right">
        <button class="music-toggle${state.musicPlaying?' playing':''}" id="music-toggle" onclick="actions.toggleMusic()" title="Toggle music">
          <img src="images/hp.png" alt="Music" />
        </button>
        <div class="privacy-badge">private and secure</div>
      </div>
    </header>

    <div class="layout">
      <div class="sidebar-overlay${state.sidebarOpen?' visible':''}" onclick="actions.closeSidebar()"></div>
      <aside class="sidebar" id="sidebar">
        <div class="nav-tabs">
          <button class="nav-tab ${state.page!=='analyzer'?'active':''}" onclick="actions.goHome()">Dreams</button>
          <button class="nav-tab ${state.page==='analyzer'?'active':''}" onclick="actions.goAnalyzer()">Analytics</button>
        </div>
        <div class="sidebar-top">
          <button class="btn-new-sidebar" onclick="actions.newEntry()">+ Record a Dream</button>
        </div>

        <div class="sidebar-section" style="margin-top:16px;">
          <div class="sidebar-label">Search</div>
          <input class="search-input" type="text" placeholder="Search dreams..." value="${esc(state.search)}" oninput="actions.setSearch(this.value)" />
        </div>

        <div class="sidebar-section" style="margin-bottom:16px;">
          <div class="sort-row">
            ${SORT_OPTIONS.map(o=>`<button class="sort-btn ${state.sortBy===o.key?'active':''}" onclick="actions.setSort('${o.key}')">${o.label}</button>`).join('')}
          </div>
        </div>

        ${usedTags.length?`<div class="sidebar-section"><div class="sidebar-label">Tags</div><div class="tag-filters"><button class="tag-pill ${!state.filterTag?'active':''}" onclick="actions.setTag('')">all</button>${usedTags.map(t=>`<button class="tag-pill ${state.filterTag===t?'active':''}" onclick="actions.setTag('${esc(t)}')">${esc(t)}</button>`).join('')}</div></div>`:''}

        ${renderDreamListHTML(dreams)}
      </aside>

      <main class="main" id="main-panel">
        <canvas class="grid-canvas" id="grid-canvas"></canvas>
        <div class="main-content${shouldAnimate?" animate":""}">
          ${mainContent}
        </div>
      </main>
    </div>

    <nav class="mobile-nav">
      <div class="mobile-nav-inner">
        <button class="mobile-nav-btn ${dreamsTabActive?'active':''}" onclick="actions.toggleSidebar()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
          Dreams
        </button>
        <button class="mobile-new-btn" onclick="actions.newEntry()" title="New dream">+</button>
        <button class="mobile-nav-btn ${analyticsTabActive?'active':''}" onclick="actions.goAnalyzer()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M3 18l4-8 4 6 4-4 4 6"/></svg>
          Analytics
        </button>
      </div>
    </nav>

    ${(state.confirmDeleteId||state.milestone)?renderModal():''}
  `;

  requestAnimationFrame(() => {
    startGrid();
    if (state.sidebarOpen) {
      const sidebar = document.getElementById('sidebar');
      if (sidebar && !sidebar.classList.contains('open')) {
        sidebar.style.transition = 'none';
        sidebar.classList.add('open');
        // re-enable transition after the instant restore
        requestAnimationFrame(() => { sidebar.style.transition = ''; });
      }
      initSidebarDrag();
    }
  });

  if ((state.page==='edit'||state.page==='new') && state.editing) {
    const ta = document.getElementById('dream-body');
    if (ta) { ta.style.height='auto'; ta.style.height=ta.scrollHeight+'px'; }
    if (state.saveStatus) { const el=document.getElementById('save-status'); if(el)el.classList.add('show'); }
    updateStarDisplay('lucidity', state.editing.lucidity);
    updateStarDisplay('quality', state.editing.quality);
  }

function renderAnalyzer() {
  const dreams = state.dreams;
  if (dreams.length === 0) {
    return `
      <div class="analyzer">
        <div class="analyzer-header">
          <div class="analyzer-title">Dream Analytics</div>
          <div class="analyzer-subtitle">No dreams recorded yet. Start journaling to see your patterns.</div>
        </div>
      </div>
    `;
  }

  // quality stored as 1-5, -1 = unrated
  const lucidityData = [0,0,0,0,0];
  const qualityData = [0,0,0,0,0];
  const tagCounts = {};

  dreams.forEach(d => {
    if (d.lucidity >= 1 && d.lucidity <= 5) lucidityData[d.lucidity - 1]++;
    if (d.quality >= 1 && d.quality <= 5) qualityData[d.quality - 1]++;
    d.tags.forEach(tag => { tagCounts[tag] = (tagCounts[tag] || 0) + 1; });
  });

  const ratedLucidDreams = dreams.filter(d => d.lucidity > 0);
  const ratedQualityDreams = dreams.filter(d => d.quality >= 1);
  const avgLucidity = ratedLucidDreams.length
    ? (ratedLucidDreams.reduce((s,d) => s + d.lucidity, 0) / ratedLucidDreams.length)
    : 0;
  const avgQuality = ratedQualityDreams.length
    ? (ratedQualityDreams.reduce((s,d) => s + d.quality, 0) / ratedQualityDreams.length)
    : 0;

  const maxLuc = Math.max(...lucidityData, 1);
  const maxQual = Math.max(...qualityData, 1);

  return `
    <div class="analyzer">
      <div class="analyzer-header">
        <div class="analyzer-title">Dream Analytics</div>
        <div class="analyzer-subtitle">See your data, understand your dreams.</div>
      </div>

      <div class="charts-grid">
        <div class="chart-card">
          <div class="chart-title">Lucidity Distribution</div>
          <div class="chart-container">
            <div class="bar-chart">
              ${lucidityData.map((count, i) => {
                const height = Math.round((count / maxLuc) * 100);
                return `
                  <div class="bar" style="height:${height}%">
                    <div class="bar-value">${count}</div>
                    <div class="bar-label">${i+1}</div>
                  </div>
                `;
              }).join('')}
            </div>
          </div>
        </div>

        <div class="chart-card">
          <div class="chart-title">Quality Distribution</div>
          <div class="chart-container">
            <div class="bar-chart">
              ${qualityData.map((count, i) => {
                const height = Math.round((count / maxQual) * 100);
                return `
                  <div class="bar" style="height:${height}%">
                    <div class="bar-value">${count}</div>
                    <div class="bar-label">${QUALITY_LABELS[i+1]}</div>
                  </div>
                `;
              }).join('')}
            </div>
          </div>
        </div>
      </div>

      <div class="stats-summary">
        <div class="stat-card"><div class="stat-value">${dreams.length}</div><div class="stat-label">Total Dreams</div></div>
        <div class="stat-card"><div class="stat-value">${avgLucidity.toFixed(1)}</div><div class="stat-label">Avg Lucidity</div></div>
        <div class="stat-card"><div class="stat-value">${avgQuality.toFixed(1)}</div><div class="stat-label">Avg Quality</div></div>
        <div class="stat-card"><div class="stat-value">${Object.keys(tagCounts).length}</div><div class="stat-label">Unique Tags</div></div>
        <div class="stat-card"><div class="stat-value">${dreams.filter(d=>d.tags.includes('lucid')).length}</div><div class="stat-label">Lucid Dreams</div></div>
      </div>
    </div>
  `;
}

function initSidebarDrag() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.querySelector('.sidebar-overlay');
  if (!sidebar || !state.sidebarOpen) return;

  let startX = 0, startY = 0, dragX = 0, locked = false, didDrag = false;
  const sidebarW = sidebar.offsetWidth;

  function onTouchStart(e) {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    dragX = 0;
    locked = false;
    didDrag = false;
    sidebar.style.transition = 'none';
    if (overlay) overlay.style.transition = 'none';
  }

  function onTouchMove(e) {
    if (locked) return;
    const dx = e.touches[0].clientX - startX;
    const dy = e.touches[0].clientY - startY;
    if (!didDrag) {
      // lock direction on first meaningful move
      if (Math.abs(dy) > Math.abs(dx)) { locked = true; return; }
      if (Math.abs(dx) < 4) return;
      didDrag = true;
    }
    if (dx > 0) return; // left only
    dragX = dx;
    sidebar.style.transform = `translateX(${dragX}px)`;
    const progress = Math.min(Math.abs(dragX) / sidebarW, 1);
    if (overlay) overlay.style.opacity = 1 - progress;
    e.preventDefault();
  }

  function onTouchEnd() {
    if (!didDrag) return;
    // restore transition for commit or snap
    sidebar.style.transition = 'transform 0.28s ease-out';
    if (overlay) overlay.style.transition = 'opacity 0.28s ease-out';

    if (Math.abs(dragX) > sidebarW * 0.3) {
      // commit close — slide to -100% via transition, then update state
      sidebar.style.transform = `translateX(-100%)`;
      if (overlay) { overlay.style.opacity = '0'; }
      setTimeout(() => { state.sidebarOpen = false; render(); }, 280);
    } else {
      // snap back
      sidebar.style.transform = 'translateX(0)';
      if (overlay) overlay.style.opacity = '1';
      setTimeout(() => {
        sidebar.style.transition = '';
        sidebar.style.transform = '';
        if (overlay) { overlay.style.transition = ''; overlay.style.opacity = ''; }
      }, 280);
    }
  }

  sidebar.addEventListener('touchstart', onTouchStart, { passive: true });
  sidebar.addEventListener('touchmove', onTouchMove, { passive: false });
  sidebar.addEventListener('touchend', onTouchEnd);
}

function updateStarDisplay(type, rating) {
  const container = document.getElementById(`${type}-stars`);
  if (!container) return;
  const selector = type === 'lucidity' ? '.star-lucid' : '.star-quality';
  container.querySelectorAll(selector).forEach(star => {
    const val = parseInt(star.dataset.rating);
    star.classList.remove('filled', 'level-1', 'level-2', 'level-3', 'level-4', 'level-5');
    if (rating >= val) {
      star.classList.add('filled', `level-${val}`);
    }
  });
}

const actions = {
  toggleMusic() {
    if (!state.audioElement) {
      state.audioElement = new Audio('files/music.mp3');
      state.audioElement.loop = true;
      state.audioElement.volume = 0.3;
    }
    if (state.musicPlaying) {
      state.audioElement.pause();
      state.musicPlaying = false;
    } else {
      state.audioElement.play().catch(e => console.log('Audio play failed:', e));
      state.musicPlaying = true;
    }
    const btn = document.getElementById('music-toggle');
    if (btn) btn.classList.toggle('playing', state.musicPlaying);
  },
  toggleSidebar() {
    if (state.sidebarOpen) {
      actions._animateCloseSidebar();
    } else {
      state.sidebarOpen = true;
      render();
      // add .open after a frame so the browser sees the transition from translateX(-100%) → 0
      requestAnimationFrame(() => {
        const sidebar = document.getElementById('sidebar');
        if (sidebar) {
          sidebar.classList.remove('open');
          requestAnimationFrame(() => {
            sidebar.classList.add('open');
            initSidebarDrag();
          });
        }
      });
    }
  },
  closeSidebar() {
    if (state.sidebarOpen) actions._animateCloseSidebar();
  },
  _animateCloseSidebar() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.querySelector('.sidebar-overlay');
    if (!sidebar) { state.sidebarOpen = false; render(); return; }
    sidebar.classList.remove('open'); // CSS transition handles the slide
    if (overlay) { overlay.classList.remove('visible'); overlay.classList.add('closing'); }
    setTimeout(() => { state.sidebarOpen = false; render(); }, 280);
  },
  goAnalyzer() {
    if (state.page==='new') actions._discardIfEmpty();
    state.page='analyzer'; state.currentId=null; state.editing=null;
    state.sidebarOpen=false; render();
  },
  goHome() {
    if (state.page==='new') actions._discardIfEmpty();
    state.page='home'; state.currentId=null; state.editing=null;
    state.sidebarOpen=false; render();
  },
  goBack() {
    if (state.page==='edit') { actions.cancelEdit(); return; }
    if (state.page==='new') { actions._discardIfEmpty(); }
    actions.goHome();
  },
  _dreamHasContent(d) {
    if (!d) return false;
    const title = document.querySelector('.title-input')?.value || d.title || '';
    const body = document.getElementById('dream-body')?.value || d.body || '';
    return title.trim() || body.trim() || d.tags.length > 0 || d.lucidity > 0 || d.quality >= 1;
  },
  _discardIfEmpty() {
    if (!state.editing) return;
    if (!actions._dreamHasContent(state.editing)) {
      state.dreams = state.dreams.filter(x => x.id !== state.editing.id);
      saveDreams(state.dreams);
    }
  },
  newEntry() {
    const d = newDream();
    state.currentId=d.id; state.editing=d; state.page='new'; state.saveStatus=false;
    state.sidebarOpen=false; render();
  },
  select(id) {
    if (state.page==='new') actions._discardIfEmpty();
    const d = state.dreams.find(x=>x.id===id); if(!d)return;
    state.currentId=id; state.editing=JSON.parse(JSON.stringify(d));
    state.page='view'; state.saveStatus=false; state.sidebarOpen=false; render();
  },
  startEdit() { state.page='edit'; render(); },
  cancelEdit() {
    const saved = state.dreams.find(d=>d.id===state.currentId);
    if (saved) state.editing=JSON.parse(JSON.stringify(saved));
    state.page='view'; render();
  },
  setTitle(v) { if(state.editing) state.editing.title=v; },
  setContinuation(id) { if(state.editing) state.editing.continuationOf = id || null; },
  togglePin(id) {
    const d = state.dreams.find(x => x.id === id);
    if (!d) return;
    d.pinned = !d.pinned;
    if (state.editing && state.editing.id === id) state.editing.pinned = d.pinned;
    saveDreams(state.dreams); render();
  },
  dismissMilestone() { state.milestone = null; render(); },
  setBody(v) { if(state.editing) state.editing.body=v; },
  setLucidity(n) {
    if (!state.editing) return;
    state.editing.lucidity = state.editing.lucidity === n ? 0 : n;
    updateStarDisplay('lucidity', state.editing.lucidity);
    updateHint('lucidity', state.editing.lucidity === 0 ? 'unrated' : `${state.editing.lucidity}/5`);
  },
  setQuality(n) {
    if (!state.editing) return;
    state.editing.quality = state.editing.quality === n ? -1 : n;
    updateStarDisplay('quality', state.editing.quality);
    updateHint('quality', state.editing.quality < 1 ? 'unrated' : QUALITY_LABELS[state.editing.quality] || 'unrated');
  },
  addTag(raw) {
    if (!state.editing) return;
    const tag = raw.trim().toLowerCase().replace(/[^a-z0-9-]/g,'');
    if (tag && !state.editing.tags.includes(tag)) {
      state.editing.tags.push(tag);
      addTagWithAnimation(tag);
    }
  },
  quickTag(t) {
    if (!state.editing || state.editing.tags.includes(t)) return;
    state.editing.tags.push(t);
    addTagWithAnimation(t);
  },
  removeTag(t) {
    if (!state.editing) return;
    state.editing.tags = state.editing.tags.filter(x=>x!==t);
    removeTagWithAnimation(t);
  },
  save() {
    if (!state.editing) return;
    const title = document.querySelector('.title-input')?.value || '';
    const body = document.getElementById('dream-body')?.value || '';
    state.editing.title=title; state.editing.body=body;
    // discard if nothing was entered
    if (!title.trim() && !body.trim() && !state.editing.tags.length && !state.editing.lucidity && state.editing.quality < 1) {
      state.dreams = state.dreams.filter(x => x.id !== state.editing.id);
      state.currentId=null; state.editing=null; state.page='home';
      saveDreams(state.dreams); render(); return;
    }
    state.editing.updatedAt=new Date().toISOString();
    const idx = state.dreams.findIndex(d=>d.id===state.editing.id);
    if (idx>=0) {
      state.dreams[idx]=JSON.parse(JSON.stringify(state.editing));
    } else {
      state.dreams.push(JSON.parse(JSON.stringify(state.editing)));
      const milestone = MILESTONES.find(m => m.count === state.dreams.length);
      if (milestone) state.milestone = milestone;
    }
    saveDreams(state.dreams); state.saveStatus=true; state.page='view';
    render();
    setTimeout(()=>{state.saveStatus=false;},2000);
  },
  confirmDelete(id) { state.confirmDeleteId=id; render(); },
  cancelDelete() { state.confirmDeleteId=null; render(); },
  executeDelete() {
    const id = state.confirmDeleteId;
    state.dreams = state.dreams.filter(d=>d.id!==id);
    if (state.currentId===id) { state.currentId=null; state.editing=null; state.page='home'; }
    state.confirmDeleteId=null; saveDreams(state.dreams); render();
  },
  setSearch(v) { state.search=v; patchDreamList(); },
  setTag(t) { state.filterTag=state.filterTag===t?'':t; patchDreamList(); },
  setSort(key) {
    if (state.sortBy===key) { state.sortDir=state.sortDir==='desc'?'asc':'desc'; }
    else { state.sortBy=key; state.sortDir='desc'; }
    patchDreamList();
  }
};

window.actions = actions;
render();
})();
</script>
</body>
</html>
