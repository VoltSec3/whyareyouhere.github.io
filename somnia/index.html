<!DOCTYPE html>
<html lang="en">
<head>
<meta property="og:title" content="Somnia" />
<meta property="og:description" content="the one and all dream journal solution. comes with analytics, and privacy-first design. no sign up, no nothing." />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://voltsec.xyz" />
<meta property="og:image" content="https://voltsec.xyz/preview.png" />
<meta property="og:site_name" content="Somnia" />
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Somnia">
<meta name="twitter:description" content="Record dreams with advanced logging and analytics. Built with privacy first.">
<meta name="twitter:image" content="https://voltsec.xyz/preview.png">
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Somnia</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0c14;
    --surface: #16121f;
    --surface2: #1e1829;
    --border: rgba(148, 130, 210, 0.15);
    --border-hover: rgba(148, 130, 210, 0.35);
    --purple: #9b87d4;
    --purple-dim: #6b57a8;
    --purple-bright: #c4b4f0;
    --purple-faint: rgba(155, 135, 212, 0.08);
    --pink-bright: #f0c4d8;
    --text: #e8e0f4;
    --text-muted: #8b7fb0;
    --text-dim: #5a5075;
    --text-title: #c4b4f0;
    --green: #7fc9a0;
    --font-serif: 'Libre Baskerville', Georgia, serif;
    --font-mono: 'DM Mono', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-serif);
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    overscroll-behavior: none;
  }

  /* app shell */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 32px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
    gap: 12px;
  }
  .header-center {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .header-stat {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 4px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
  }
  .header-stat-value { color: var(--purple); }
  .logo {
    font-size: 20px;
    letter-spacing: 0.12em;
    color: var(--purple-bright);
    font-weight: 400;
    font-style: italic;
    cursor: pointer;
    transition: opacity 0.15s;
    line-height: 1;
    flex-shrink: 0;
  }
  .logo:hover { opacity: 0.7; }
  .logo-sub {
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--text-dim);
    font-style: normal;
    font-family: var(--font-mono);
    margin-top: 3px;
    display: block;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .privacy-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--green);
    background: rgba(127,201,160,0.08);
    border: 1px solid rgba(127,201,160,0.2);
    padding: 5px 12px;
    border-radius: 20px;
    letter-spacing: 0.05em;
  }
  .privacy-badge::before {
    content: '';
    width: 6px;
    height: 6px;
    background: var(--green);
    border-radius: 50%;
    display: inline-block;
    flex-shrink: 0;
  }
  .music-toggle {
    width: 32px;
    height: 32px;
    border: 1px solid var(--border);
    color: var(--text-dim);
    background: transparent;
    cursor: pointer;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .music-toggle:hover { border-color: var(--border-hover); color: var(--text-muted); }
  .music-toggle.playing { border-color: var(--purple-dim); color: var(--purple-bright); background: var(--purple-faint); }
  .music-toggle img { width: 20px; height: 20px; opacity: 0.5; transition: opacity 0.2s; }
  .music-toggle.playing img { opacity: 1; }

  /* layout */
  .layout {
    display: flex;
    flex: 1;
    height: calc(100vh - 61px);
    height: calc(100dvh - 61px);
    overflow: hidden;
  }

  /* sidebar */
  .sidebar {
    width: 268px;
    min-width: 268px;
    border-right: 1px solid var(--border);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    transition: transform 0.3s ease;
    scrollbar-width: none;
  }
  .sidebar::-webkit-scrollbar { display: none; }
  .sidebar-top { padding: 16px 20px; border-bottom: 1px solid var(--border); }
  .nav-tabs {
    display: flex;
    gap: 2px;
    border-bottom: 1px solid var(--border);
  }
  .nav-tab {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    padding: 10px 14px;
    border: none;
    background: none;
    color: var(--text-dim);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color 0.2s, border-color 0.2s;
    position: relative;
  }
  .nav-tab:hover { color: var(--text-muted); }
  .nav-tab.active { color: var(--purple-bright); border-bottom-color: var(--purple); }
  .sidebar-section { padding: 0 20px; margin-bottom: 16px; }
  .sidebar-label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 10px;
  }
  .btn-new-sidebar {
    display: block;
    width: 100%;
    background: var(--purple-faint);
    border: 1px solid var(--border-hover);
    color: var(--purple-bright);
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    padding: 12px 16px;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    text-align: center;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-new-sidebar:hover { background: rgba(155,135,212,0.15); border-color: var(--purple); }
  .search-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 8px 12px;
    border-radius: 4px;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-input:focus { border-color: var(--purple-dim); }
  .search-input::placeholder { color: var(--text-dim); }
  .sort-row { display: flex; gap: 5px; justify-content: center; }
  .sort-btn {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.04em;
    padding: 5px 12px;
    border-radius: 4px;
    cursor: pointer;
    border: 1px solid var(--border);
    color: var(--text-dim);
    background: transparent;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .sort-btn:hover { border-color: var(--border-hover); color: var(--text-muted); }
  .sort-btn.active { border-color: var(--purple-dim); color: var(--purple-bright); background: var(--purple-faint); }
  .tag-filters { display: flex; flex-wrap: wrap; gap: 5px; }
  .tag-pill {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.04em;
    padding: 5px 10px;
    border-radius: 4px;
    cursor: pointer;
    border: 1px solid var(--border);
    color: var(--text-dim);
    background: transparent;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .tag-pill:hover { border-color: var(--border-hover); color: var(--text-muted); }
  .tag-pill.active { border-color: var(--purple-dim); color: var(--purple-bright); background: var(--purple-faint); }
  .dream-count {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-dim);
    padding: 0 20px 10px;
  }
  .dream-list { overflow-y: auto; overflow-x: hidden; flex: 1; scrollbar-width: none; }
  .dream-list::-webkit-scrollbar { display: none; }
  .dream-item {
    position: relative;
    padding: 14px 20px;
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: background 0.2s, padding-left 0.2s, border-color 0.2s;
    border-bottom: 1px solid var(--border);
    -webkit-tap-highlight-color: transparent;
  }
  .dream-item:hover { background: var(--surface); padding-left: 24px; }
  .dream-item.active { border-left-color: var(--purple); background: var(--surface); }
  .dream-item-inner { padding-right: 26px; }

  /* ── FIX 3: Relative timestamp — in-place crossfade, no box, no layout shift ── */
  .dream-item-date {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    margin-bottom: 4px;
    position: relative;
    display: block;
    height: 1.2em;
  }
  .dream-item-date .rel-time,
  .dream-item-date .abs-time {
    position: absolute;
    left: 0; top: 0;
    transition: opacity 0.2s ease;
    white-space: nowrap;
  }
  .dream-item-date .rel-time { opacity: 1; }
  .dream-item-date .abs-time { opacity: 0; color: var(--purple-bright); font-size: 10px; }
  .dream-item-date:hover .rel-time { opacity: 0; }
  .dream-item-date:hover .abs-time { opacity: 1; }

  .dream-item-title { font-size: 13px; color: var(--text-title); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
  .dream-item-preview { font-size: 12px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-style: italic; }
  .dream-item-tags { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
  .mini-tag { font-family: var(--font-mono); font-size: 9px; color: var(--purple-dim); background: var(--purple-faint); border-radius: 2px; padding: 1px 5px; }
  .dream-item-close {
    position: absolute;
    right: 9px;
    top: 50%;
    transform: translateY(-50%);
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 1px solid rgba(107,87,168,0.45);
    background: rgba(107,87,168,0.12);
    color: rgba(196,180,240,0.55);
    font-size: 11px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.2s, background 0.15s, border-color 0.15s, color 0.15s;
    font-family: var(--font-mono);
    font-weight: 300;
    -webkit-tap-highlight-color: transparent;
  }
  .dream-item:hover .dream-item-close { opacity: 1; }
  .dream-item-close:hover { background: rgba(107,87,168,0.22); border-color: rgba(155,135,212,0.6); color: var(--purple-bright); }
  .empty-list { padding: 40px 20px; text-align: center; color: var(--text-dim); font-style: italic; font-size: 13px; }

  /* ── FIX 2: gradient border via inline CSS var set in JS ── */

  /* main */
  .main {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  @keyframes fadeInContent {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .main-content { }
  .main-content.animate { animation: fadeInContent 0.4s ease; }

  /* grid canvas */
  .grid-canvas { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }

  /* viewer */
  .viewer { flex: 1; padding: 40px 48px; max-width: 760px; width: 100%; margin: 0 auto; position: relative; z-index: 1; }
  .viewer-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; gap: 12px; flex-wrap: wrap; }
  .meta-date {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--text-dim);
    position: relative;
    display: inline-block;
    cursor: default;
    height: 1.3em;
    min-width: 160px;
  }
  /* ── FIX 3: Viewer/editor date — in-place crossfade ── */
  .meta-date .rel-time,
  .meta-date .abs-time {
    position: absolute;
    left: 0; top: 0;
    transition: opacity 0.2s ease;
    white-space: nowrap;
  }
  .meta-date .rel-time { opacity: 1; }
  .meta-date .abs-time { opacity: 0; color: var(--purple-bright); }
  .meta-date:hover .rel-time { opacity: 0; }
  .meta-date:hover .abs-time { opacity: 1; }

  .viewer-top-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .btn-edit {
    background: none;
    border: 1px solid var(--border-hover);
    color: var(--purple-bright);
    padding: 9px 20px;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-edit:hover { background: var(--purple-faint); border-color: var(--purple); }
  .btn-share {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 9px 16px;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .btn-share:hover { border-color: var(--border-hover); color: var(--text); }
  .view-star-systems { display: flex; gap: 36px; margin-bottom: 24px; flex-wrap: wrap; }
  .view-star-system { display: flex; flex-direction: column; gap: 5px; }
  .view-star-label { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--text-dim); }
  .view-stars { display: flex; gap: 4px; }
  .vstar { font-size: 15px; color: var(--purple-bright); opacity: 0.18; }
  .vstar.on { opacity: 1; }
  .vstar.level-1 { color: var(--purple); }
  .vstar.level-2 { color: var(--purple-bright); }
  .vstar.level-3 { color: #b19fff; }
  .vstar.level-4 { color: #c4b4f0; }
  .vstar.level-5 { color: #e8e0f4; }
  .vstar-q { font-size: 15px; color: var(--pink-bright); opacity: 0.18; }
  .vstar-q.on { opacity: 1; }
  .vstar-q.level-1 { color: #f0c4d8; }
  .vstar-q.level-2 { color: #ffb3ba; }
  .vstar-q.level-3 { color: #ff9999; }
  .vstar-q.level-4 { color: #ff7f7f; }
  .vstar-q.level-5 { color: #ff4d4d; }
  .view-star-hint { font-family: var(--font-mono); font-size: 9px; color: var(--text-dim); }
  .view-title { font-size: 28px; line-height: 1.5; color: var(--text-title); white-space: pre-wrap; min-height: 40px; }
  .view-title.untitled { color: var(--text-dim); font-style: italic; font-weight: 400; }
  .view-body { font-family: var(--font-serif); font-size: 16px; line-height: 1.85; color: var(--text-muted); font-style: italic; white-space: pre-wrap; min-height: 80px; }
  .view-body.empty { color: var(--text-dim); }
  .view-tags-row { margin-top: 28px; padding-top: 20px; border-top: 1px solid var(--border); display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .view-tags-label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.2em; color: var(--text-dim); text-transform: uppercase; }
  .view-tag { font-family: var(--font-mono); font-size: 11px; color: var(--purple-dim); background: var(--purple-faint); border-radius: 2px; padding: 1px 5px; }
  .view-footer { margin-top: 28px; padding-top: 20px; border-top: 1px solid var(--border); }
  .btn-delete {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 9px 18px;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-delete:hover { border-color: var(--border-hover); color: var(--text); }

  /* editor */
  .editor { flex: 1; padding: 40px 48px; max-width: 760px; width: 100%; margin: 0 auto; position: relative; z-index: 1; }
  .editor.editor-new { animation: fadeInContent 0.4s ease; }
  .editor-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; gap: 12px; flex-wrap: wrap; }
  .btn-cancel-edit {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 9px 18px;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-cancel-edit:hover { border-color: var(--border-hover); color: var(--text); }
  .star-systems { display: flex; gap: 36px; margin-bottom: 24px; align-items: flex-start; flex-wrap: wrap; }
  .star-system { display: flex; flex-direction: column; gap: 5px; }
  .star-system-label { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--text-dim); }
  .stars-row { display: flex; gap: 4px; }
  .star-system-hint { font-family: var(--font-mono); font-size: 9px; color: var(--text-dim); letter-spacing: 0.05em; }
  .star-lucid { font-size: 22px; cursor: pointer; opacity: 0.18; transition: all 0.2s ease; color: var(--purple-dim); user-select: none; -webkit-tap-highlight-color: transparent; }
  .star-lucid.filled { opacity: 1; }
  .star-lucid.filled.level-1 { color: var(--purple); }
  .star-lucid.filled.level-2 { color: var(--purple-bright); }
  .star-lucid.filled.level-3 { color: #b19fff; }
  .star-lucid.filled.level-4 { color: #c4b4f0; }
  .star-lucid.filled.level-5 { color: #e8e0f4; }
  .star-lucid:hover { transform: scale(1.1); opacity: 0.8; }
  .star-quality { font-size: 22px; cursor: pointer; opacity: 0.18; transition: all 0.2s ease; color: #d4a0a0; user-select: none; -webkit-tap-highlight-color: transparent; }
  .star-quality.filled { opacity: 1; }
  .star-quality.filled.level-1 { color: #f0c4d8; }
  .star-quality.filled.level-2 { color: #ffb3ba; }
  .star-quality.filled.level-3 { color: #ff9999; }
  .star-quality.filled.level-4 { color: #ff7f7f; }
  .star-quality.filled.level-5 { color: #ff4d4d; }
  .star-quality:hover { transform: scale(1.1); opacity: 0.8; }
  .title-input {
    width: 100%;
    background: none;
    border: none;
    font-family: var(--font-serif);
    font-size: 28px;
    font-weight: 700;
    color: var(--text-title);
    outline: none;
    margin-bottom: 20px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 16px;
    line-height: 1.3;
  }
  .title-input::placeholder { color: var(--text-dim); }
  /* ── FIX 4: Body input wrapper for char count ── */
  .body-input-wrap {
    position: relative;
    margin-bottom: 0;
  }
  .body-input {
    width: 100%;
    background: none;
    border: none;
    font-family: var(--font-serif);
    font-size: 16px;
    line-height: 1.85;
    color: var(--text-muted);
    outline: none;
    resize: none;
    min-height: 320px;
    font-style: italic;
    display: block;
  }
  .body-input::placeholder { color: var(--text-dim); font-style: italic; }
  .body-char-count {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 0.06em;
    margin-top: 6px;
    text-align: left;
    transition: color 0.2s;
    user-select: none;
  }
  .body-char-count.has-content { color: var(--purple-dim); }

  .tags-row { margin-top: 28px; padding-top: 20px; border-top: 1px solid var(--border); display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .tags-label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.2em; color: var(--text-dim); text-transform: uppercase; }
  .tag-editable {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--purple-dim);
    background: var(--purple-faint);
    border-radius: 2px;
    padding: 3px 7px;
    cursor: pointer;
    transition: all 0.2s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .tag-editable:hover { background: rgba(155,135,212,0.3); color: var(--purple); transform: translateY(-1px); }
  .tag-input {
    background: none;
    border: none;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text);
    outline: none;
    width: 90px;
    padding: 3px 0;
  }
  .tag-input::placeholder { color: var(--text-dim); }
  .editor-footer { margin-top: 28px; padding-top: 20px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
  .btn-save {
    background: var(--purple);
    color: #0e0c14;
    border: none;
    padding: 11px 28px;
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.1em;
    cursor: pointer;
    border-radius: 4px;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-save:hover { background: var(--purple-bright); }
  .save-status { font-family: var(--font-mono); font-size: 11px; color: var(--green); opacity: 0; transition: opacity 0.3s; margin-left: auto; }
  .save-status.show { opacity: 1; }

  /* sleep notes */
  .sleep-notes-section {
    margin-top: 28px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }
  .sleep-notes-label {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .sleep-notes-label::after {
    content: 'pre-dream';
    font-size: 8px;
    color: var(--purple-dim);
    letter-spacing: 0.15em;
    background: var(--purple-faint);
    border: 1px solid var(--border);
    padding: 1px 6px;
    border-radius: 2px;
  }
  .sleep-notes-input {
    width: 100%;
    background: rgba(155,135,212,0.04);
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: var(--font-mono);
    font-size: 12px;
    line-height: 1.7;
    padding: 12px 14px;
    border-radius: 4px;
    outline: none;
    resize: none;
    min-height: 80px;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    letter-spacing: 0.02em;
  }
  .sleep-notes-input:focus {
    border-color: rgba(155,135,212,0.3);
    background: rgba(155,135,212,0.06);
    box-shadow: 0 0 0 3px rgba(155,135,212,0.06);
  }
  .sleep-notes-input::placeholder { color: var(--text-dim); }
  /* view mode sleep notes */
  .view-sleep-notes {
    margin-top: 28px;
    padding: 16px 20px;
    background: rgba(155,135,212,0.04);
    border: 1px solid var(--border);
    border-left: 2px solid var(--purple-dim);
    border-radius: 0 4px 4px 0;
  }
  .view-sleep-notes-label {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--purple-dim);
    margin-bottom: 8px;
  }
  .view-sleep-notes-body {
    font-family: var(--font-mono);
    font-size: 12px;
    line-height: 1.7;
    color: var(--text-muted);
    white-space: pre-wrap;
  }

  /* lucidity trend chart */
  .trend-chart-wrap {
    position: relative;
    height: 140px;
    margin-top: 8px;
  }
  .trend-svg { width: 100%; height: 100%; overflow: visible; }
  .trend-area { fill: url(#lucAreaGrad); }
  .trend-line { fill: none; stroke: var(--purple); stroke-width: 1.5; stroke-linejoin: round; stroke-linecap: round; }
  .trend-dot {
    fill: var(--bg);
    stroke: var(--purple-bright);
    stroke-width: 1.5;
    transition: r 0.15s ease, stroke 0.15s;
    cursor: pointer;
  }
  .trend-dot:hover { stroke: #fff; }
  .trend-zero { stroke: var(--border); stroke-width: 1; stroke-dasharray: 3 3; }
  .trend-label {
    font-family: var(--font-mono);
    font-size: 9px;
    fill: var(--text-dim);
  }
  .trend-avg-line { stroke: rgba(155,135,212,0.3); stroke-width: 1; stroke-dasharray: 4 4; }
  .trend-avg-label { font-family: var(--font-mono); font-size: 8px; fill: var(--purple-dim); }
  .analyzer { flex: 1; padding: 40px 48px; max-width: 900px; width: 100%; margin: 0 auto; position: relative; z-index: 1; }
  .analyzer-header { margin-bottom: 32px; }
  .analyzer-title { font-size: 24px; font-weight: 700; color: var(--text-title); margin-bottom: 8px; }
  .analyzer-subtitle { font-size: 14px; color: var(--text-muted); font-style: italic; }
  .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 32px; }
  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 20px;
    transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
  }
  .chart-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(155,135,212,0.1); border-color: var(--border-hover); }
  .chart-title { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 16px; }
  .chart-container { height: 200px; position: relative; }
  .bar-chart { display: flex; align-items: flex-end; height: 160px; gap: 8px; padding: 0 4px; }
  .bar {
    flex: 1;
    background: var(--purple-faint);
    border: 1px solid var(--border);
    border-radius: 2px 2px 0 0;
    position: relative;
    transition: background 0.2s, border-color 0.2s, transform 0.2s;
    cursor: pointer;
    min-height: 2px;
  }
  .bar:hover { background: var(--purple); border-color: var(--purple-bright); transform: scaleY(1.05); transform-origin: bottom; }
  .bar-label { font-family: var(--font-mono); font-size: 9px; color: var(--text-dim); position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%); white-space: nowrap; }
  .bar-value { font-family: var(--font-mono); font-size: 10px; color: var(--purple-bright); position: absolute; top: -18px; left: 50%; transform: translateX(-50%); opacity: 0; transition: opacity 0.2s; }
  .bar:hover .bar-value { opacity: 1; }
  .stats-summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 16px; margin-top: 24px; }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 16px;
    text-align: center;
    transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
  }
  .stat-card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(155,135,212,0.15); border-color: var(--purple-dim); }
  .stat-value { font-size: 24px; font-weight: 700; color: var(--purple-bright); margin-bottom: 4px; }
  .stat-label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; color: var(--text-dim); text-transform: uppercase; }

  /* modals */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(10,8,18,0.88);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 999;
    animation: fadeIn 0.18s ease;
    padding: 20px;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: #1a1528;
    border: 1px solid rgba(155,135,212,0.28);
    border-radius: 10px;
    padding: 32px 32px 28px;
    max-width: 340px;
    width: 100%;
    animation: slideUp 0.22s cubic-bezier(0.34,1.2,0.64,1);
    box-shadow: 0 24px 64px rgba(0,0,0,0.5), 0 0 0 1px rgba(155,135,212,0.06) inset;
    position: relative;
    overflow: hidden;
  }
  .modal::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent 0%, rgba(155,135,212,0.5) 40%, rgba(196,180,240,0.7) 50%, rgba(155,135,212,0.5) 60%, transparent 100%);
  }
  @keyframes slideUp { from { opacity: 0; transform: translateY(16px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
  .modal-title { font-family: var(--font-serif); font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 10px; line-height: 1.3; }
  .modal-body { font-family: var(--font-serif); font-size: 14px; color: var(--text-muted); line-height: 1.7; font-style: italic; margin-bottom: 24px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .btn-modal-cancel {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(148,130,210,0.2);
    color: var(--text-muted);
    padding: 10px 18px;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    cursor: pointer;
    border-radius: 6px;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-modal-cancel:hover { border-color: var(--border-hover); color: var(--text); background: rgba(255,255,255,0.07); }
  .btn-modal-confirm {
    background: linear-gradient(135deg, var(--purple-dim), #7d65c0);
    color: #e8e0f4;
    border: none;
    padding: 10px 18px;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    cursor: pointer;
    border-radius: 6px;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
    box-shadow: 0 2px 12px rgba(107,87,168,0.3);
  }
  .btn-modal-confirm:hover { background: linear-gradient(135deg, var(--purple), #9b87d4); color: #0e0c14; box-shadow: 0 4px 16px rgba(155,135,212,0.4); }

  /* mobile bottom nav */
  .mobile-nav {
    display: none;
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--bg);
    border-top: 1px solid var(--border);
    z-index: 200;
    padding: 8px 0 max(8px, env(safe-area-inset-bottom));
  }
  .mobile-nav-inner {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 0 24px;
    gap: 0;
  }
  .mobile-nav-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding: 8px 0;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-dim);
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.1em;
    transition: color 0.15s;
    -webkit-tap-highlight-color: transparent;
    width: 100%;
  }
  .mobile-nav-btn.active { color: var(--purple-bright); }
  .mobile-nav-btn svg { width: 20px; height: 20px; }
  .mobile-new-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: rgba(107,87,168,0.12);
    border: 1px solid rgba(107,87,168,0.45);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(196,180,240,0.75);
    font-size: 22px;
    line-height: 1;
    font-family: var(--font-mono);
    font-weight: 300;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    -webkit-tap-highlight-color: transparent;
    box-shadow: none;
  }
  .mobile-new-btn:hover { background: rgba(107,87,168,0.22); border-color: rgba(155,135,212,0.6); color: var(--purple-bright); }

  /* mobile back button in header */
  .btn-back {
    display: none;
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 7px 14px;
    font-family: var(--font-mono);
    font-size: 11px;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
    white-space: nowrap;
  }
  .btn-back:hover { border-color: var(--border-hover); color: var(--text); }

  /* mobile overlay for sidebar */
  .sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(14,12,20,0.7);
    z-index: 150;
  }
  .sidebar-overlay.visible { display: block; }

  /* continuation */
  .continuation-row { margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .continuation-label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.2em; color: var(--text-dim); text-transform: uppercase; white-space: nowrap; }
  .continuation-select { background: var(--surface); border: 1px solid var(--border); color: var(--text-muted); font-family: var(--font-mono); font-size: 11px; padding: 6px 10px; border-radius: 4px; outline: none; cursor: pointer; flex: 1; min-width: 0; transition: border-color 0.15s; appearance: none; -webkit-appearance: none; }
  .continuation-select:focus { border-color: var(--purple-dim); }
  .continuation-select option { background: var(--surface2); }
  .view-continuation { margin-top: 0; margin-bottom: 20px; display: flex; flex-direction: column; gap: 6px; }
  .view-continuation-link { display: inline-flex; align-items: center; gap: 7px; font-family: var(--font-mono); font-size: 11px; color: var(--purple-dim); cursor: pointer; transition: color 0.15s; width: fit-content; }
  .view-continuation-link:hover { color: var(--purple-bright); }
  .view-continuation-link .cont-arrow { font-size: 13px; }
  .view-continuation-title { font-style: italic; color: var(--text-muted); }

  /* milestone modal */
  .milestone-modal { text-align: center; }
  .milestone-glyph { font-size: 44px; margin-bottom: 14px; display: block; animation: obIconIn 0.5s cubic-bezier(0.34,1.56,0.64,1); }
  .milestone-modal .modal-title { font-size: 21px; margin-bottom: 8px; }
  .milestone-modal .modal-body { margin-bottom: 24px; font-size: 13px; }

  /* milestone glyph on dream item */
  .pin-marker { opacity: 0.7; font-size: 13px; margin-left: 6px; vertical-align: middle; }
  .btn-pin {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 9px 18px;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-pin:hover { border-color: var(--border-hover); color: var(--text); }
  .btn-pin.pinned { border-color: var(--purple-dim); color: var(--purple-bright); background: var(--purple-faint); }
  .view-milestone { display: flex; align-items: center; justify-content: flex-start; gap: 8px; font-family: var(--font-mono); font-size: 10px; color: var(--purple-dim); letter-spacing: 0.15em; margin-bottom: 16px; }
  .view-milestone-glyph { font-size: 20px; color: var(--purple-bright); }

  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ================================================================
     ONBOARDING FLOW
  ================================================================ */
  .onboarding-overlay {
    position: fixed;
    inset: 0;
    background: rgba(10,8,18,0.92);
    z-index: 2000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    animation: fadeIn 0.4s ease;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }
  .onboarding-card {
    background: #1a1528;
    border: 1px solid rgba(155,135,212,0.28);
    border-radius: 10px;
    max-width: 480px;
    width: 100%;
    overflow: hidden;
    position: relative;
    box-shadow: 0 32px 80px rgba(0,0,0,0.55), 0 0 0 1px rgba(155,135,212,0.06) inset;
  }
  .onboarding-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent 0%, rgba(155,135,212,0.5) 40%, rgba(196,180,240,0.7) 50%, rgba(155,135,212,0.5) 60%, transparent 100%);
    z-index: 1;
  }
  .onboarding-progress {
    height: 2px;
    background: var(--border);
    position: relative;
  }
  .onboarding-progress-fill {
    height: 100%;
    background: var(--purple);
    transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
    border-radius: 0 2px 2px 0;
  }
  .onboarding-body {
    padding: 36px 36px 28px;
  }
  .onboarding-step-label {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--purple-dim);
    margin-bottom: 16px;
  }
  .onboarding-icon {
    font-size: 36px;
    margin-bottom: 16px;
    display: block;
    animation: obIconIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes obIconIn { from { transform: scale(0.5) rotate(-10deg); opacity: 0; } to { transform: scale(1) rotate(0deg); opacity: 1; } }
  .onboarding-title {
    font-family: var(--font-serif);
    font-size: 22px;
    font-weight: 700;
    color: var(--text-title);
    margin-bottom: 12px;
    line-height: 1.3;
  }
  .onboarding-desc {
    font-family: var(--font-serif);
    font-size: 14px;
    line-height: 1.8;
    color: var(--text-muted);
    font-style: italic;
    margin-bottom: 24px;
  }
  .onboarding-spotlight {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 16px 20px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }
  .onboarding-spotlight::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--purple), transparent);
    animation: shimmerLine 2s infinite;
  }
  @keyframes shimmerLine {
    0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; }
  }
  .onboarding-spotlight-text {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-muted);
    line-height: 1.6;
  }
  .onboarding-spotlight-text strong { color: var(--purple-bright); font-weight: 400; }

  /* Placeholder dream editor inside onboarding */
  .ob-dream-editor {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 20px;
  }
  .ob-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-serif);
    font-size: 14px;
    padding: 10px 14px;
    border-radius: 4px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .ob-input:focus { border-color: var(--purple-dim); box-shadow: 0 0 0 3px rgba(155,135,212,0.1); }
  .ob-input::placeholder { color: var(--text-dim); font-style: italic; }
  .ob-textarea-wrap {
    position: relative;
  }
  .ob-textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-serif);
    font-size: 13px;
    line-height: 1.7;
    padding: 10px 14px 26px 14px;
    border-radius: 4px;
    outline: none;
    resize: none;
    min-height: 90px;
    font-style: italic;
    transition: border-color 0.2s, box-shadow 0.2s;
    display: block;
    width: 100%;
  }
  .ob-textarea:focus { border-color: var(--purple-dim); box-shadow: 0 0 0 3px rgba(155,135,212,0.1); }
  .ob-textarea::placeholder { color: var(--text-dim); }
  /* ── FIX 4: char count pinned inside textarea bottom-left ── */
  .ob-chars {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--text-dim);
    transition: color 0.2s;
    position: absolute;
    bottom: 8px;
    left: 14px;
    pointer-events: none;
    letter-spacing: 0.04em;
  }
  .ob-chars.has-content { color: var(--purple-dim); }

  /* ── FIX 1: Tags step — tags wrap properly, button sits below ── */
  .ob-tag-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .ob-quick-tag {
    font-family: var(--font-mono);
    font-size: 10px;
    padding: 4px 10px;
    border-radius: 3px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
  }
  .ob-quick-tag.selected { border-color: var(--purple-dim); color: var(--purple-bright); background: var(--purple-faint); }

  /* The actions row sits BELOW all content with consistent bottom margin */
  .onboarding-actions {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-top: 4px;
  }

  .ob-stars-row { display: flex; gap: 6px; align-items: center; }
  .ob-star { font-size: 20px; cursor: pointer; opacity: 0.18; transition: all 0.2s; color: var(--purple-dim); user-select: none; }
  .ob-star.filled { opacity: 1; color: var(--purple-bright); }
  .ob-star:hover { transform: scale(1.15); opacity: 0.7; }
  .ob-field-label { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 6px; }
  .ob-field { display: flex; flex-direction: column; gap: 4px; }

  /* "Delete it" step */
  .ob-delete-demo {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .ob-delete-demo:hover { border-color: var(--border-hover); }
  .ob-delete-demo-text { flex: 1; }
  .ob-delete-demo-title { font-family: var(--font-serif); font-size: 13px; color: var(--text-title); margin-bottom: 2px; }
  .ob-delete-demo-body { font-family: var(--font-serif); font-size: 11px; color: var(--text-muted); font-style: italic; }
  .ob-delete-btn {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 1px solid rgba(107,87,168,0.45);
    background: rgba(107,87,168,0.12);
    color: rgba(196,180,240,0.55);
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;

<body>
<div id="app"></div>

<script>
(function() {

const STORAGE_KEY = 'somnia_dreams_v1';
const ONBOARDING_KEY = 'somnia_onboarding_done';
const DRAFT_KEY = 'somnia_draft_v1';

function loadDreams() { try { const r = localStorage.getItem(STORAGE_KEY); return r ? JSON.parse(r) : []; } catch(e) { return []; } }
function saveDreams(d) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch(e) {} }
function loadDraft() { try { const r = localStorage.getItem(DRAFT_KEY); return r ? JSON.parse(r) : null; } catch(e) { return null; } }
function saveDraft(d) { try { if (d) localStorage.setItem(DRAFT_KEY, JSON.stringify(d)); else localStorage.removeItem(DRAFT_KEY); } catch(e) {} }
function clearDraft() { try { localStorage.removeItem(DRAFT_KEY); } catch(e) {} }
function onboardingDone() { try { return !!localStorage.getItem(ONBOARDING_KEY); } catch(e) { return false; } }
function markOnboardingDone() { try { localStorage.setItem(ONBOARDING_KEY, '1'); } catch(e) {} }

function formatDate(iso) { return new Date(iso).toLocaleDateString('en-US', { weekday:'short', year:'numeric', month:'short', day:'numeric' }); }
function formatTime(iso) { return new Date(iso).toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' }); }

/* ── FIX 3: Relative time helper ── */
function relativeTime(iso) {
  const now = Date.now();
  const then = new Date(iso).getTime();
  const diff = now - then;
  const mins = Math.floor(diff / 60000);
  const hours = Math.floor(diff / 3600000);
  const days = Math.floor(diff / 86400000);
  const weeks = Math.floor(days / 7);
  const months = Math.floor(days / 30.4);
  const years = Math.floor(days / 365);
  if (mins < 1) return 'just now';
  if (mins < 60) return `${mins} min${mins===1?'':'s'} ago`;
  if (hours < 24) return `${hours} hour${hours===1?'':'s'} ago`;
  if (days < 7) return `${days} day${days===1?'':'s'} ago`;
  if (weeks < 5) return `${weeks} week${weeks===1?'':'s'} ago`;
  if (months < 12) return `${months} month${months===1?'':'s'} ago`;
  return `${years} year${years===1?'':'s'} ago`;
}

function newDream() { return { id: Date.now().toString(), title:'', body:'', sleepNotes:'', tags:[], lucidity:0, quality:-1, continuationOf: null, pinned: false, createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() }; }

const ALL_TAGS = ['flying','water','chase','lucid','recurring','people','places','surreal','peaceful','dark'];
const QUALITY_LABELS = ['', 'bad dream', 'ordinary', 'pleasant', 'vivid', 'blissful'];
const SORT_OPTIONS = [{key:'date',label:'Date'},{key:'lucidity',label:'Lucidity'},{key:'quality',label:'Quality'}];
const MILESTONES = [
  { count: 1,   glyph: '✦', title: 'First dream recorded', body: 'The journey begins. Every great dreamer starts with a single entry.' },
  { count: 10,  glyph: '◈', title: 'Ten dreams', body: 'A week of nights, give or take. Patterns are starting to form.' },
  { count: 25,  glyph: '◉', title: 'Twenty-five dreams', body: 'You\'re building a real archive of your inner world.' },
  { count: 50,  glyph: '⬡', title: 'Fifty dreams', body: 'Half a hundred. Your subconscious has a lot to say.' },
  { count: 100, glyph: '✸', title: 'One hundred dreams', body: 'A century of dreams. This is something rare.' },
  { count: 250, glyph: '❋', title: 'Two hundred and fifty dreams', body: 'A dedicated dreamer. The archive grows deep.' },
  { count: 500, glyph: '✺', title: 'Five hundred dreams', body: 'Extraordinary. Your dream journal is a life\'s work.' },
];
const FLAVOR = [
  { title: 'Somnia', body: 'The latin root <em>somnus</em> which means <strong>sleep</strong>. The root is used in medical disorders like <em>insomnia</em>, <em>somniphobia</em> or <em>somnambulism</em> (sleepwalking).' },
  { title: '…?', body: '<em>The mind wanders far when the body is still.</em>' },
  { title: 'hello!', body: 'welcome to somnia, a dream journal for the <strong>lucid</strong> and the <strong>curious.</strong> i wish you <strong>luck</strong> on your path, <ins>whatever it may be...</ins>' }
];

/* ================================================================
   ONBOARDING STATE
================================================================ */
const OB_STEPS = [
  {
    icon: '🌙',
    title: 'Welcome to Somnia',
    desc: 'Your private dream journal. No account, no server. Everything stays on your device. Let\'s take 60 seconds to get you started.',
    type: 'info',
    spotlightHtml: '<strong>Privacy first.</strong> Dreams are personal. Somnia stores everything in your browser\'s local storage. Only you can ever read these.',
    nextLabel: 'Let\'s go →'
  },
  {
    icon: '✍️',
    title: 'Record your first dream',
    desc: 'Give it a title and write down what you remember. Even fragments are worth keeping.',
    type: 'editor',
    nextLabel: 'Looks good →'
  },
  {
    icon: '★',
    title: 'Rate it',
    desc: 'Two quick ratings help you find patterns over time. How vivid the dream was, and how it felt.',
    type: 'rating',
    nextLabel: 'Got it →'
  },
  {
    icon: '🏷️',
    title: 'Tag what you saw',
    desc: 'Tags let you filter and search dreams later. Add a few that match, or skip.',
    type: 'tags',
    nextLabel: 'Save my dream →'
  },
  {
    icon: '🗑️',
    title: 'How to delete a dream',
    desc: 'That was a placeholder. Now delete it by hovering over a dream in the sidebar and clicking the × button, or use Delete inside the entry.',
    type: 'delete',
    nextLabel: 'Done!'
  }
];

let ob = {
  step: 0,
  title: '',
  body: '',
  lucidity: 0,
  tags: [],
  obDreamId: null,
  deleteClicked: false
};

function obRender() {
  let el = document.getElementById('onboarding-overlay');
  if (!el) { el = document.createElement('div'); el.id = 'onboarding-overlay'; el.className = 'onboarding-overlay'; document.body.appendChild(el); }
  const step = OB_STEPS[ob.step];
  const progress = ((ob.step + 1) / OB_STEPS.length) * 100;
  const canNext = ob.step !== 4 || ob.deleteClicked;
  el.innerHTML = `
    <div class="onboarding-card">
      <div class="onboarding-progress"><div class="onboarding-progress-fill" style="width:${progress}%"></div></div>
      <div class="onboarding-body" id="ob-body">
        <div class="onboarding-step-label">Step ${ob.step+1} of ${OB_STEPS.length}</div>
        <span class="onboarding-icon">${step.icon}</span>
        <div class="onboarding-title">${step.title}</div>
        <div class="onboarding-desc">${step.desc}</div>
        ${renderObStepContent(step)}
        <div class="onboarding-actions">
          <button class="ob-skip" onclick="obActions.skip()">Skip intro</button>
          <button class="ob-next" id="ob-next-btn" onclick="obActions.next()" ${canNext?'':'disabled'}>${step.nextLabel}</button>
        </div>
      </div>
    </div>
  `;
  if (step.type === 'editor') {
    const ti = el.querySelector('#ob-title'); if (ti) ti.addEventListener('input', e => {
      ob.title = e.target.value;
    });
    const ta = el.querySelector('#ob-body-ta'); if (ta) ta.addEventListener('input', e => {
      ob.body = e.target.value;
      /* ── FIX 4: update char count in onboarding ── */
      const cc = el.querySelector('#ob-char-count');
      if (cc) {
        const len = e.target.value.length;
        cc.textContent = len > 0 ? `${len} chars` : '';
        cc.className = 'ob-chars' + (len > 0 ? ' has-content' : '');
      }
    });
  }
  if (step.type === 'rating') {
    el.querySelectorAll('.ob-star').forEach(s => {
      s.addEventListener('click', () => {
        ob.lucidity = parseInt(s.dataset.v);
        el.querySelectorAll('.ob-star').forEach(x => {
          const v = parseInt(x.dataset.v);
          x.classList.toggle('filled', v <= ob.lucidity);
        });
      });
    });
  }
  if (step.type === 'tags') {
    el.querySelectorAll('.ob-quick-tag').forEach(t => {
      t.addEventListener('click', () => {
        const tag = t.dataset.tag;
        if (ob.tags.includes(tag)) { ob.tags = ob.tags.filter(x => x !== tag); t.classList.remove('selected'); }
        else { ob.tags.push(tag); t.classList.add('selected'); }
      });
    });
  }
  if (step.type === 'delete') {
    const dBtn = el.querySelector('#ob-delete-btn');
    if (dBtn) dBtn.addEventListener('click', () => {
      ob.deleteClicked = true;
      if (ob.obDreamId) {
        state.dreams = state.dreams.filter(d => d.id !== ob.obDreamId);
        saveDreams(state.dreams);
        ob.obDreamId = null;
      }
      const demoEl = el.querySelector('#ob-delete-demo');
      if (demoEl) {
        demoEl.style.transition = 'opacity 0.3s, transform 0.3s';
        demoEl.style.opacity = '0';
        demoEl.style.transform = 'translateX(20px)';
        setTimeout(() => {

function getMilestoneForDream(dreamId) {
  const byAge = [...state.dreams].sort((a,b) => new Date(a.createdAt) - new Date(b.createdAt));
  const pos = byAge.findIndex(d => d.id === dreamId) + 1;
  return MILESTONES.find(m => m.count === pos) || null;
}

function sortedDreams(list) {
  return [...list].sort((a,b) => {
    if (a.pinned && !b.pinned) return -1;
    if (!a.pinned && b.pinned) return 1;
    let va, vb;
    if (state.sortBy==='date') { va=new Date(a.updatedAt).getTime(); vb=new Date(b.updatedAt).getTime(); }
    else if (state.sortBy==='lucidity') { va=a.lucidity||0; vb=b.lucidity||0; }
    else { va=a.quality<0?-1:a.quality; vb=b.quality<0?-1:b.quality; }
    return state.sortDir==='desc'?vb-va:va-vb;
  });
}
function filteredDreams() {
  let list = [...state.dreams];
  if (state.search.trim()) { const q=state.search.toLowerCase(); list=list.filter(d=>d.title.toLowerCase().includes(q)||d.body.toLowerCase().includes(q)||d.tags.some(t=>t.toLowerCase().includes(q))); }
  if (state.filterTag) list=list.filter(d=>d.tags.includes(state.filterTag));
  return sortedDreams(list);
}
function allUsedTags() { const s=new Set(); state.dreams.forEach(d=>d.tags.forEach(t=>s.add(t))); return Array.from(s); }

/* ================================================================
   GRID
================================================================ */
let gridRAF = null, gridCanvas = null, gridCtx = null, gridW = 0, gridH = 0, gridT = 0;
let gridOffX = 0, gridOffY = 0, gridTargetOX = 0, gridTargetOY = 0;
let gridResizeObs = null, gridMouseHandler = null;

function gridDraw() {
  if (!gridCanvas || !gridCtx) return;
  gridRAF = requestAnimationFrame(gridDraw);
  gridT += 0.003;
  gridOffX += (gridTargetOX - gridOffX) * 0.05;
  gridOffY += (gridTargetOY - gridOffY) * 0.05;
  gridCtx.clearRect(0, 0, gridW, gridH);
  const CELL = 52;
  const driftX = (gridT * 10) % CELL;
  const driftY = (gridT * 7) % CELL;
  const baseX = -CELL + gridOffX * 0.5 - driftX;
  const baseY = -CELL + gridOffY * 0.5 - driftY;
  const cols = Math.ceil(gridW / CELL) + 3;
  const rows = Math.ceil(gridH / CELL) + 3;
  gridCtx.strokeStyle = 'rgba(155, 135, 212, 0.16)';
  gridCtx.lineWidth = 0.5;
  gridCtx.beginPath();
  for (let c = 0; c <= cols; c++) { const x = Math.round(baseX + c * CELL) + 0.5; gridCtx.moveTo(x, 0); gridCtx.lineTo(x, gridH); }
  for (let r = 0; r <= rows; r++) { const y = Math.round(baseY + r * CELL) + 0.5; gridCtx.moveTo(0, y); gridCtx.lineTo(gridW, y); }
  gridCtx.stroke();
}

function startGrid() {
  const canvas = document.getElementById('grid-canvas');
  if (!canvas) return;
  stopGrid();
  gridCanvas = canvas;
  gridCtx = canvas.getContext('2d');
  function sizeCanvas() { const p = canvas.parentElement; if (!p) return; gridW = canvas.width = p.clientWidth; gridH = canvas.height = p.clientHeight; }
  sizeCanvas();
  gridResizeObs = new ResizeObserver(sizeCanvas);
  gridResizeObs.observe(canvas.parentElement);
  const mainEl = canvas.parentElement;
  gridMouseHandler = (e) => {
    const r = mainEl.getBoundingClientRect();
    gridTargetOX = ((e.clientX - r.left) / r.width - 0.5) * 24;
    gridTargetOY = ((e.clientY - r.top) / r.height - 0.5) * 16;
  };
  mainEl.addEventListener('mousemove', gridMouseHandler);
  gridDraw();
}
function stopGrid() {
  if (gridRAF) { cancelAnimationFrame(gridRAF); gridRAF = null; }
  if (gridResizeObs) { gridResizeObs.disconnect(); gridResizeObs = null; }
  if (gridCanvas && gridMouseHandler) { gridCanvas.parentElement && gridCanvas.parentElement.removeEventListener('mousemove', gridMouseHandler); gridMouseHandler = null; }
  gridCanvas = null; gridCtx = null;
}

function renderAnalyzer() {
  const dreams = state.dreams;
  if (dreams.length === 0) {
    return `<div class="analyzer"><div class="analyzer-header"><div class="analyzer-title">Dream Analytics</div><div class="analyzer-subtitle">No dreams recorded yet. Start journaling to see your patterns.</div></div></div>`;
  }
  const lucidityData = [0,0,0,0,0], qualityData = [0,0,0,0,0];
  const tagCounts = {};
  dreams.forEach(d => {
    if (d.lucidity >= 1 && d.lucidity <= 5) lucidityData[d.lucidity - 1]++;
    if (d.quality >= 1 && d.quality <= 5) qualityData[d.quality - 1]++;
    d.tags.forEach(tag => { tagCounts[tag] = (tagCounts[tag] || 0) + 1; });
  });
  const ratedLucidDreams = dreams.filter(d => d.lucidity > 0);
  const ratedQualityDreams = dreams.filter(d => d.quality >= 1);
  const avgLucidity = ratedLucidDreams.length ? (ratedLucidDreams.reduce((s,d) => s + d.lucidity, 0) / ratedLucidDreams.length) : 0;
  const avgQuality = ratedQualityDreams.length ? (ratedQualityDreams.reduce((s,d) => s + d.quality, 0) / ratedQualityDreams.length) : 0;
  const maxLuc = Math.max(...lucidityData, 1), maxQual = Math.max(...qualityData, 1);

  // Lucidity trend — chronological, only rated entries, max 40 shown
  const trendDreams = [...dreams]
    .sort((a,b) => new Date(a.createdAt) - new Date(b.createdAt))
    .filter(d => d.lucidity > 0)
    .slice(-40);
  const trendSVG = buildLucidityTrendSVG(trendDreams, avgLucidity);

  return `
    <div class="analyzer">
      <div class="analyzer-header"><div class="analyzer-title">Dream Analytics</div><div class="analyzer-subtitle">See your data, understand your dreams.</div></div>

      ${trendDreams.length >= 2 ? `
      <div class="chart-card" style="margin-bottom:24px;">
        <div class="chart-title">Lucidity Over Time</div>
        <div class="trend-chart-wrap">${trendSVG}</div>
      </div>` : ''}

      <div class="charts-grid">
        <div class="chart-card"><div class="chart-title">Lucidity Distribution</div><div class="chart-container"><div class="bar-chart">${lucidityData.map((count, i) => `<div class="bar" style="height:${Math.round((count/maxLuc)*100)}%"><div class="bar-value">${count}</div><div class="bar-label">${i+1}</div></div>`).join('')}</div></div></div>
        <div class="chart-card"><div class="chart-title">Quality Distribution</div><div class="chart-container"><div class="bar-chart">${qualityData.map((count, i) => `<div class="bar" style="height:${Math.round((count/maxQual)*100)}%"><div class="bar-value">${count}</div><div class="bar-label">${QUALITY_LABELS[i+1]}</div></div>`).join('')}</div></div></div>
      </div>
      <div class="stats-summary">
        <div class="stat-card"><div class="stat-value">${dreams.length}</div><div class="stat-label">Total Dreams</div></div>
        <div class="stat-card"><div class="stat-value">${avgLucidity.toFixed(1)}</div><div class="stat-label">Avg Lucidity</div></div>
        <div class="stat-card"><div class="stat-value">${avgQuality.toFixed(1)}</div><div class="stat-label">Avg Quality</div></div>
        <div class="stat-card"><div class="stat-value">${Object.keys(tagCounts).length}</div><div class="stat-label">Unique Tags</div></div>
        <div class="stat-card"><div class="stat-value">${dreams.filter(d=>d.tags.includes('lucid')).length}</div><div class="stat-label">Lucid Dreams</div></div>
      </div>
    </div>
  `;
}

function buildLucidityTrendSVG(trendDreams, avgLucidity) {
  if (trendDreams.length < 2) return '';

  const W = 800, H = 140;
  const padL = 28, padR = 16, padT = 16, padB = 24;
  const chartW = W - padL - padR;
  const chartH = H - padT - padB;

  const n = trendDreams.length;
  // x positions evenly spaced
  const xs = trendDreams.map((_, i) => padL + (i / (n - 1)) * chartW);
  // y: lucidity 1–5, invert so 5 is top
  const yScale = v => padT + chartH - ((v - 1) / 4) * chartH;
  const ys = trendDreams.map(d => yScale(d.lucidity));

  // Smooth bezier path using cardinal spline
  function smoothPath(pts) {
    if (pts.length < 2) return '';
    let d = `M ${pts[0][0]},${pts[0][1]}`;
    for (let i = 0; i < pts.length - 1; i++) {
      const p0 = pts[Math.max(i - 1, 0)];
      const p1 = pts[i];
      const p2 = pts[i + 1];
      const p3 = pts[Math.min(i + 2, pts.length - 1)];
      const t = 0.35;
      const cp1x = p1[0] + (p2[0] - p0[0]) * t;
      const cp1y = p1[1] + (p2[1] - p0[1]) * t;
      const cp2x = p2[0] - (p3[0] - p1[0]) * t;
      const cp2y = p2[1] - (p3[1] - p1[1]) * t;
      d += ` C ${cp1x},${cp1y} ${cp2x},${cp2y} ${p2[0]},${p2[1]}`;
    }
    return d;
  }

  const pts = xs.map((x, i) => [x, ys[i]]);
  const linePath = smoothPath(pts);
  // Area path: line + close down to baseline
  const baseY = padT + chartH;
  const areaPath = linePath + ` L ${xs[n-1]},${baseY} L ${xs[0]},${baseY} Z`;

  // avg line y
  const avgY = yScale(avgLucidity);

  // y-axis tick labels (1–5)
  const yTicks = [1,2,3,4,5].map(v => {
    const ty = yScale(v);
    return `<text class="trend-label" x="${padL - 6}" y="${ty + 3}" text-anchor="end">${v}</text>
    <line x1="${padL}" y1="${ty}" x2="${padL + chartW}" y2="${ty}" class="trend-zero" />`;
  }).join('');

  // x-axis: show first, middle, last dates
  const xLabels = [0, Math.floor((n-1)/2), n-1].map(i => {
    const d = trendDreams[i];
    const label = new Date(d.createdAt).toLocaleDateString('en-US', { month:'short', day:'numeric' });
    return `<text class="trend-label" x="${xs[i]}" y="${H - 4}" text-anchor="middle">${label}</text>`;
  }).join('');

  // dots
  const dots = pts.map(([x,y], i) => {
    const d = trendDreams[i];
    const title = `${d.title||'Untitled'} - ${d.lucidity}/5`;
    return `<circle class="trend-dot" cx="${x}" cy="${y}" r="3" onclick="actions.select('${d.id}')"><title>${esc(title)}</title></circle>`;
  }).join('');

  // moving average overlay (window=5)
  const maWindow = Math.min(5, Math.floor(n / 2));
  const maPts = trendDreams.map((_, i) => {
    const start = Math.max(0, i - Math.floor(maWindow/2));
    const end   = Math.min(n, start + maWindow);
    const slice = trendDreams.slice(start, end);
    const ma = slice.reduce((s,d) => s + d.lucidity, 0) / slice.length;
    return [xs[i], yScale(ma)];
  });
  const maPath = smoothPath(maPts);

  return `
    <svg class="trend-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
      <defs>
        <linearGradient id="lucAreaGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#9b87d4" stop-opacity="0.18"/>
          <stop offset="100%" stop-color="#9b87d4" stop-opacity="0"/>
        </linearGradient>
      </defs>
      ${yTicks}
      <path d="${areaPath}" class="trend-area"/>
      <line x1="${padL}" y1="${avgY}" x2="${padL+chartW}" y2="${avgY}" class="trend-avg-line"/>
      <text class="trend-avg-label" x="${padL+chartW+3}" y="${avgY+3}">avg</text>
      <path d="${linePath}" class="trend-line"/>
      <path d="${maPath}" fill="none" stroke="rgba(196,180,240,0.4)" stroke-width="1" stroke-dasharray="3 2" stroke-linejoin="round" stroke-linecap="round"/>
      ${dots}
      ${xLabels}
    </svg>
  `;
}

/* ================================================================

================================================================ */
function addTagWithAnimation(tag) {
  if (!state.editing) return;
  const tagsRow = document.querySelector('.tags-row');
  if (!tagsRow) return;
  const tagInput = tagsRow.querySelector('.tag-input');
  const el = document.createElement('span');
  el.className = 'tag-editable';
  el.setAttribute('onclick', `actions.removeTag('${esc(tag)}')`);
  el.setAttribute('title', 'Click to remove');
  el.style.opacity = '0';
  el.style.transition = 'opacity 0.3s ease, transform 0.2s ease';
  el.textContent = tag;
  tagsRow.insertBefore(el, tagInput || null);
  requestAnimationFrame(() => { el.style.opacity = '1'; el.style.transform = 'translateY(-1px)'; });
  updateQuickTagButtons();
}

function removeTagWithAnimation(tag) {
  if (!state.editing) return;
  document.querySelectorAll('.tag-editable').forEach(el => {
    if (el.textContent === tag) {
      el.style.transition = 'opacity 0.2s ease, transform 0.2s ease';
      el.style.opacity = '0'; el.style.transform = 'translateY(2px)';
      setTimeout(() => { el.remove(); updateQuickTagButtons(); }, 200);
    }
  });
}

function updateQuickTagButtons() {
  if (!state.editing) return;
  const footer = document.querySelector('.editor-footer');
  if (!footer) return;
  const container = footer.previousElementSibling;
  if (container) container.innerHTML = ALL_TAGS.filter(t=>!state.editing.tags.includes(t)).map(t=>`<button class="tag-pill" onclick="actions.quickTag('${t}')">${t}</button>`).join('');
}

function updateStarDisplay(type, rating) {
  const container = document.getElementById(`${type}-stars`);
  if (!container) return;
  const selector = type === 'lucidity' ? '.star-lucid' : '.star-quality';
  container.querySelectorAll(selector).forEach(star => {
    const val = parseInt(star.dataset.rating);
    star.classList.remove('filled', 'level-1', 'level-2', 'level-3', 'level-4', 'level-5');
    if (rating >= val) star.classList.add('filled', `level-${val}`);
  });
}
function updateHint(type, hint) { const el = document.getElementById(`${type}-hint`); if (el) el.textContent = hint; }

  let startX = 0, startY = 0, dragX = 0, locked = false, didDrag = false;
  const sidebarW = sidebar.offsetWidth;
  function onTouchStart(e) { startX = e.touches[0].clientX; startY = e.touches[0].clientY; dragX = 0; locked = false; didDrag = false; sidebar.style.transition = 'none'; if (overlay) overlay.style.transition = 'none'; }
  function onTouchMove(e) {
    if (locked) return;
    const dx = e.touches[0].clientX - startX, dy = e.touches[0].clientY - startY;
    if (!didDrag) { if (Math.abs(dy) > Math.abs(dx)) { locked = true; return; } if (Math.abs(dx) < 4) return; didDrag = true; }
    if (dx > 0) return;
    dragX = dx;
    sidebar.style.transform = `translateX(${dragX}px)`;
    const progress = Math.min(Math.abs(dragX) / sidebarW, 1);
    if (overlay) overlay.style.opacity = 1 - progress;
    e.preventDefault();
  }
  function onTouchEnd() {
    if (!didDrag) return;
    sidebar.style.transition = 'transform 0.28s ease-out';
    if (overlay) overlay.style.transition = 'opacity 0.28s ease-out';
    if (Math.abs(dragX) > sidebarW * 0.3) {
      sidebar.style.transform = `translateX(-100%)`;
      if (overlay) overlay.style.opacity = '0';
      setTimeout(() => { state.sidebarOpen = false; render(); }, 280);
    } else {
      sidebar.style.transform = 'translateX(0)';
      if (overlay) overlay.style.opacity = '1';
      setTimeout(() => { sidebar.style.transition = ''; sidebar.style.transform = ''; if (overlay) { overlay.style.transition = ''; overlay.style.opacity = ''; } }, 280);
    }
  }
  sidebar.addEventListener('touchstart', onTouchStart, { passive: true });
  sidebar.addEventListener('touchmove', onTouchMove, { passive: false });
  sidebar.addEventListener('touchend', onTouchEnd);
}

/* ================================================================
   ACTIONS
================================================================ */
const actions = {
  toggleMusic() {
    if (!state.audioElement) { state.audioElement = new Audio('files/music.mp3'); state.audioElement.loop = true; state.audioElement.volume = 0.3; }
    if (state.musicPlaying) { state.audioElement.pause(); state.musicPlaying = false; }
    else { state.audioElement.play().catch(e => {}); state.musicPlaying = true; }
    const btn = document.getElementById('music-toggle');
    if (btn) btn.classList.toggle('playing', state.musicPlaying);
  },

  toggleSidebar() {
    if (state.sidebarOpen) { actions._animateCloseSidebar(); }
    else {
      state.sidebarOpen = true; render();
      requestAnimationFrame(() => {
        const sidebar = document.getElementById('sidebar');
        if (sidebar) { sidebar.classList.remove('open'); requestAnimationFrame(() => { sidebar.classList.add('open'); initSidebarDrag(); }); }
      });
    }
  },
  closeSidebar() { if (state.sidebarOpen) actions._animateCloseSidebar(); },
  _animateCloseSidebar() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.querySelector('.sidebar-overlay');
    if (!sidebar) { state.sidebarOpen = false; render(); return; }
    sidebar.classList.remove('open');
    if (overlay) { overlay.classList.remove('visible'); overlay.classList.add('closing'); }
    setTimeout(() => { state.sidebarOpen = false; render(); }, 280);
  },

  guardedGoHome() { actions.goHome(); },
  guardedGoAnalyzer() { actions.goAnalyzer(); },
  guardedNewEntry() { actions.newEntry(); },

  goAnalyzer() {
    if (state.page==='new') actions._discardIfEmpty();
    state.page='analyzer'; state.currentId=null; state.editing=null;
    state.sidebarOpen=false; clearDraft(); render();
  },
  goHome() {
    if (state.page==='new') actions._discardIfEmpty();
    state.page='home'; state.currentId=null; state.editing=null;
    state.sidebarOpen=false; clearDraft(); render();
  },
  goBack() {
    if (state.page==='edit') { actions.cancelEdit(); return; }
    if (state.page==='new') { actions._discardIfEmpty(); }
    actions.goHome();
  },

  navConfirmDiscard() {
    const fn = state.navConfirm?.action;
    state.navConfirm = null;
    clearDraft();
    if (state.editing) { state.dreams = state.dreams.filter(x => x.id !== state.editing.id); saveDreams(state.dreams); }
    state.editing = null;
    if (fn) fn();
    else render();
  },
  navConfirmSaveDraft() {
    const titleEl = document.querySelector('.title-input');
    const bodyEl = document.getElementById('dream-body');
    if (state.editing) {
      const draft = JSON.parse(JSON.stringify(state.editing));
      if (titleEl) draft.title = titleEl.value;
      if (bodyEl) draft.body = bodyEl.value;
      draft._isNew = state.page === 'new';
      saveDraft(draft);
      if (state.page === 'new') { state.dreams = state.dreams.filter(x => x.id !== draft.id); saveDreams(state.dreams); }
    }
    const fn = state.navConfirm?.action;
    state.navConfirm = null;
    state.editing = null;
    state.showDraftBanner = true;
    if (fn) fn();
    else render();
  },
  navConfirmSave() {
    const titleEl = document.querySelector('.title-input');
    const bodyEl = document.getElementById('dream-body');
    if (state.editing) {
      if (titleEl) state.editing.title = titleEl.value;
      if (bodyEl) state.editing.body = bodyEl.value;
      state.editing.updatedAt = new Date().toISOString();
      if (!state.editing.title.trim() && !state.editing.body.trim()) {
        state.dreams = state.dreams.filter(x => x.id !== state.editing.id);
      } else {
        const idx = state.dreams.findIndex(d => d.id === state.editing.id);
        if (idx >= 0) state.dreams[idx] = JSON.parse(JSON.stringify(state.editing));
        else state.dreams.push(JSON.parse(JSON.stringify(state.editing)));
      }
      saveDreams(state.dreams);
    }
    clearDraft();
    const fn = state.navConfirm?.action;
    state.navConfirm = null;
    state.editing = null;
    if (fn) fn();
    else render();
  },

  restoreDraft() {
    const draft = loadDraft();
    if (!draft) return;
    state.editing = draft;
    state.page = draft._isNew ? 'new' : 'edit';
    state.currentId = draft.id;
    state.showDraftBanner = false;
    clearDraft();
    render();
  },
  discardDraft() {
    clearDraft();
    state.showDraftBanner = false;
    render();
  },

  openShare(id) { state.shareModalDreamId = id; renderShareModal(); },
  closeShare() {
    state.shareModalDreamId = null;
    const el = document.getElementById('share-modal-root');
    if (el) { el.style.opacity = '0'; el.style.transition = 'opacity 0.2s'; setTimeout(() => el.remove(), 200); }
  },
  setShareStyle(s) {
    state.shareStyle = s;
    const el = document.getElementById('share-modal-root');
    if (el) {
      const d = state.dreams.find(x => x.id === state.shareModalDreamId);
      if (d) el.innerHTML = buildShareModalHTML(d, s);
    }
  },
  copyShareCard() {
    const cardEl = document.getElementById('share-card-el');
    if (!cardEl) return;
    const btn = document.getElementById('copy-card-btn');
    if (btn) {
      const d = state.dreams.find(x => x.id === state.shareModalDreamId);
      if (d) {
        const text = `✦ ${d.title || 'Untitled'}\n${formatDate(d.createdAt)}\n\n${(d.body||'').slice(0,300)}${d.body && d.body.length > 300 ? '…' : ''}\n\n— recorded in Somnia`;
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(() => {
            btn.classList.add('copied');
            btn.textContent = '✓ Copied text!';
            setTimeout(() => { btn.classList.remove('copied'); btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copy as image`; }, 2000);
          });
        }
      }
    }
  },

  _dreamHasContent(d) {
    if (!d) return false;
    const title = document.querySelector('.title-input')?.value || d.title || '';
    const body = document.getElementById('dream-body')?.value || d.body || '';
    return title.trim() || body.trim() || d.tags.length > 0 || d.lucidity > 0 || d.quality >= 1;
  },
  _discardIfEmpty() {
    if (!state.editing) return;
    if (!actions._dreamHasContent(state.editing)) {
      state.dreams = state.dreams.filter(x => x.id !== state.editing.id);
      saveDreams(state.dreams);
    }
  },
  newEntry() {
    const d = newDream();
    state.currentId=d.id; state.editing=d; state.page='new'; state.saveStatus=false;
    state.sidebarOpen=false; render();
  },
  select(id) {
    if (state.page==='new') actions._discardIfEmpty();
    const d = state.dreams.find(x=>x.id===id); if(!d)return;
    state.currentId=id; state.editing=JSON.parse(JSON.stringify(d));
    state.page='view'; state.saveStatus=false; state.sidebarOpen=false; clearDraft(); render();
  },
  startEdit() { state.page='edit'; render(); },
  cancelEdit() {
    const saved = state.dreams.find(d=>d.id===state.currentId);
    if (saved) state.editing=JSON.parse(JSON.stringify(saved));
    clearDraft(); state.page='view'; render();
  },
  setTitle(v) { if(state.editing) { state.editing.title=v; scheduleDraftSave(); } },
  setBody(v) { if(state.editing) { state.editing.body=v; scheduleDraftSave(); } },
  setSleepNotes(v) { if(state.editing) { state.editing.sleepNotes=v; scheduleDraftSave(); } },
  setContinuation(id) { if(state.editing) state.editing.continuationOf = id || null; },
  togglePin(id) {
    const d = state.dreams.find(x => x.id === id);
    if (!d) return;
    d.pinned = !d.pinned;
    if (state.editing && state.editing.id === id) state.editing.pinned = d.pinned;
    saveDreams(state.dreams); render();
  },
  dismissMilestone() { state.milestone = null; render(); },
  setLucidity(n) {
    if (!state.editing) return;
    state.editing.lucidity = state.editing.lucidity === n ? 0 : n;
    updateStarDisplay('lucidity', state.editing.lucidity);
    updateHint('lucidity', state.editing.lucidity === 0 ? 'unrated' : `${state.editing.lucidity}/5`);
    scheduleDraftSave();
  },
  setQuality(n) {
    if (!state.editing) return;
    state.editing.quality = state.editing.quality === n ? -1 : n;
    updateStarDisplay('quality', state.editing.quality);
    updateHint('quality', state.editing.quality < 1 ? 'unrated' : QUALITY_LABELS[state.editing.quality] || 'unrated');
    scheduleDraftSave();
  },
  addTag(raw) {
    if (!state.editing) return;
    const tag = raw.trim().toLowerCase().replace(/[^a-z0-9-]/g,'');
    if (tag && !state.editing.tags.includes(tag)) { state.editing.tags.push(tag); addTagWithAnimation(tag); scheduleDraftSave(); }
  },
  quickTag(t) {
    if (!state.editing || state.editing.tags.includes(t)) return;
    state.editing.tags.push(t); addTagWithAnimation(t); scheduleDraftSave();
  },
  removeTag(t) {
    if (!state.editing) return;
    state.editing.tags = state.editing.tags.filter(x=>x!==t);
    removeTagWithAnimation(t); scheduleDraftSave();
  },
  save() {
    if (!state.editing) return;
    const title = document.querySelector('.title-input')?.value || '';
    const body = document.getElementById('dream-body')?.value || '';
    const sleepNotes = document.querySelector('.sleep-notes-input')?.value || '';
    state.editing.title=title; state.editing.body=body; state.editing.sleepNotes=sleepNotes;
    if (!title.trim() && !body.trim() && !state.editing.tags.length && !state.editing.lucidity && state.editing.quality < 1) {
      state.dreams = state.dreams.filter(x => x.id !== state.editing.id);
      state.currentId=null; state.editing=null; state.page='home';
      saveDreams(state.dreams); clearDraft(); render(); return;
    }
    state.editing.updatedAt=new Date().toISOString();
    const idx = state.dreams.findIndex(d=>d.id===state.editing.id);
    if (idx>=0) {
      state.dreams[idx]=JSON.parse(JSON.stringify(state.editing));
    } else {
      state.dreams.push(JSON.parse(JSON.stringify(state.editing)));
      const milestone = MILESTONES.find(m => m.count === state.dreams.length);
      if (milestone) state.milestone = milestone;
    }
    saveDreams(state.dreams); clearDraft(); state.saveStatus=true; state.page='view';
    render();
    setTimeout(()=>{state.saveStatus=false;},2000);
  },
  confirmDelete(id) { state.confirmDeleteId=id; render(); },
  cancelDelete() { state.confirmDeleteId=null; render(); },
  executeDelete() {
    const id = state.confirmDeleteId;
    state.dreams = state.dreams.filter(d=>d.id!==id);
    if (state.currentId===id) { state.currentId=null; state.editing=null; state.page='home'; }
    state.confirmDeleteId=null; saveDreams(state.dreams); render();
  },
  setSearch(v) { state.search=v; patchDreamList(); },
  setTag(t) { state.filterTag=state.filterTag===t?'':t; patchDreamList(); },
  setSort(key) {
    if (state.sortBy===key) { state.sortDir=state.sortDir==='desc'?'asc':'desc'; }
    else { state.sortBy=key; state.sortDir='desc'; }
    patchDreamList();
  }
};

window.actions = actions;

/* ================================================================
   BOOT
================================================================ */
render();

if (!onboardingDone()) {
  requestAnimationFrame(() => { obRender(); });
}

})();
</script>
